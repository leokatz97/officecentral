<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BBI · Template 4 — Landing (OECM)</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="src/tokens.css" />
<link rel="stylesheet" href="src/bbi-components.css" />
<link rel="stylesheet" href="src/homepage.css" />
<link rel="stylesheet" href="src/collection-category.css" />
<link rel="stylesheet" href="src/collection.css" />
<link rel="stylesheet" href="src/landing.css" />
<link rel="stylesheet" href="src/audits.css" />

<style>
  /* Page-level scaffold: stack template render, divider, audits panel */
  body { background: var(--background); }
  .pg-shell { display: block; }
  .pg-divider {
    border: none;
    border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
    margin: 0;
  }
  .pg-audits-band {
    background: var(--background);
    padding: var(--space-12) 0 var(--space-16);
  }
</style>
</head>
<body>
  <div id="root" class="pg-shell"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- locked components — provide HeaderDesktop / HeaderMobile / Footer / MapleLeaf / Placeholder -->
  <script type="text/babel" src="src/Homepage.jsx"></script>
  <!-- new template -->
  <script type="text/babel" src="src/Landing.jsx"></script>
  <!-- audits -->
  <script type="text/babel" src="src/Audits.jsx"></script>

  <script type="text/babel">
    function Page() {
      return (
        <React.Fragment>
          <window.Landing />
          <hr className="pg-divider" />
          <div className="pg-audits-band">
            <window.Audits template="landing" />
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
  </script>
</body>
</html>
