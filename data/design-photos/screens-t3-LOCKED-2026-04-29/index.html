<!-- Force bundler to embed logo asset (referenced from JSX strings).
     The CSS url() forces the bundler to inline the PNG into its manifest.
     The runtime patch below redirects <img src="assets/bbi-logo-v2.png">
     to the blob URL of the embedded copy. -->
<style>
.__bundle-logo-dep { background-image: url("assets/bbi-logo-v2.png"); display: none; }
</style>
<script>
(function(){
  // Run after bundler unpacks: it injects window.__resources after <head>,
  // but our resources don't use ext-resource-dependency meta tags, so
  // window.__resources won't have the logo. Instead, we sniff the
  // background-image of our hidden marker class to recover the blob: URL
  // the bundler created for assets/bbi-logo-v2.png, then rewrite every
  // <img src="assets/bbi-logo-v2.png"> on the page (and in JSX-rendered
  // components, via a MutationObserver).
  function recoverLogoBlobUrl(){
    var el = document.createElement('div');
    el.className = '__bundle-logo-dep';
    document.body.appendChild(el);
    var bg = getComputedStyle(el).backgroundImage || '';
    el.remove();
    var m = bg.match(/url\(["']?(blob:[^"')]+)["']?\)/);
    return m ? m[1] : null;
  }
  function patchImgs(blobUrl){
    if (!blobUrl) return;
    Array.from(document.querySelectorAll('img')).forEach(function(img){
      if ((img.getAttribute('src')||'').indexOf('bbi-logo-v2') !== -1) {
        img.src = blobUrl;
      }
    });
  }
  function start(){
    // Bundler injects window.__resources after head; wait for body so
    // computed style of our marker class works.
    var blobUrl = null;
    var tryFix = function(){
      if (!blobUrl) blobUrl = recoverLogoBlobUrl();
      if (blobUrl) patchImgs(blobUrl);
    };
    tryFix();
    var mo = new MutationObserver(function(muts){
      for (var i = 0; i < muts.length; i++) {
        var m = muts[i];
        for (var j = 0; j < m.addedNodes.length; j++) {
          var n = m.addedNodes[j];
          if (!n || n.nodeType !== 1) continue;
          if (n.tagName === 'IMG' || (n.querySelectorAll && n.querySelectorAll('img').length)) {
            tryFix();
            return;
          }
        }
      }
    });
    if (document.body) mo.observe(document.body, {childList: true, subtree: true});
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
