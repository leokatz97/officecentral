.hp-mobile .bbi-footer__col--contact .row { grid-template-columns: 64px 1fr; }


/* ===== collection-category.css ===== */
/* ============================================================
   collection-category.css — template 2 scoped styles
   /collections/business-furniture (the catalogue map)

   Composes ONLY tokens from tokens.css and patterns from
   bbi-components.css. No new tokens. No invented bbi-* classes.

   New template-scoped classes (cc- prefix):
     .cc-page          — page wrapper
     .cc-crumb-band    — breadcrumbs band (reuses .bbi-crumbs)
     .cc-intro         — intro band (heading + spec plate)
     .cc-cat-grid      — 9-up category grid (reuses .bbi-card--collection)
     .cc-industry      — industry shortcut tile (compact)
     .cc-brand-index   — tiered text-list brand index
     .cc-oecm          — OECM bar (mirrors locked homepage .hp-oecm)
   ============================================================ */

/* ---- breadcrumb band ---- */
.cc-crumb-band {
  border-bottom: 1px solid var(--borderColor);
}
.cc-crumb-band__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 16px 32px;
}

/* ---- intro band ----------------------------------------------------- */
.cc-intro {
  padding: 80px 0 64px;
}
.cc-intro__grid {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 64px;
  align-items: end;
}
.cc-intro__copy {
  max-width: 60ch;
}
.cc-intro__eyebrow {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--textColor);
  opacity: 0.6;
  margin: 0 0 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.cc-intro__eyebrow::before {
  content: "";
  width: 24px; height: 1px;
  background: var(--saleBadgeBackground);
}
.cc-intro__title {
  font-family: var(--headingFont);
  font-size: clamp(40px, 5.4vw, 64px);
  line-height: 1.05;
  letter-spacing: -0.018em;
  font-weight: 600;
  margin: 0 0 24px;
  color: var(--headingColor);
  text-wrap: balance;
}
.cc-intro__deck {
  font-size: 18px;
  line-height: 1.5;
  color: var(--textColor);
  margin: 0 0 12px;
  max-width: 56ch;
}
.cc-intro__sub {
  font-size: 15px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: 0;
  max-width: 52ch;
}

/* hero image plate (replaces former spec plate) */
.cc-intro__media {
  position: relative;
  /* Lands at ~copy-block height; r3-final patch 2 (was 4 / 5). */
  aspect-ratio: 3 / 2;
  border-radius: var(--cardRadius);
  overflow: hidden;
  background: var(--alternateBackground);
}
.cc-intro__media .bbi-ph { border-radius: var(--cardRadius); }
.cc-intro__caption {
  position: absolute;
  left: 12px; bottom: 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  /* White literal on dark caption pill — matches homepage hero caption pattern */
  color: #FFFFFF;
  background: rgba(var(--shadowColor-rgb), 0.7);
  border-radius: 2px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.cc-intro__caption .dot {
  width: 6px; height: 6px;
  border-radius: 99px;
  background: var(--saleBadgeBackground);
}

/* ---- 9-up category grid ------------------------------------------- */
.cc-cat-section { padding: 32px 0 96px; }
.cc-cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.cc-cat-grid--mobile {
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
/* Slight overrides on .bbi-card--collection for this template — taller
   tile, descriptor line below the count. Composes the homepage card. */
.cc-cat-grid .bbi-card--collection { aspect-ratio: 5 / 4; }
.cc-cat-grid .bbi-card--collection .bbi-card__overlay {
  padding: 24px 20px 18px;
}
.cc-cat-grid .bbi-card--collection .bbi-card__overlay h3 {
  font-size: 22px;
  letter-spacing: -0.012em;
}
.cc-cat-grid .bbi-card--collection .bbi-card__overlay .desc {
  /* Direct white literal — same justification as bbi-card__overlay .count
     in bbi-components.css: white on a dark gradient is not a token of any
     scheme; this matches that pattern exactly. */
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  line-height: 1.4;
  margin-top: 4px;
  display: block;
}
.cc-cat-grid .bbi-card--collection .bbi-card__num {
  position: absolute;
  top: 16px; left: 16px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  /* White literal — same overlay-system justification as above. */
  color: rgba(255,255,255,0.85);
  background: rgba(var(--shadowColor-rgb), 0.55);
  padding: 4px 8px;
  border-radius: 2px;
  z-index: 1;
}

/* ---- industry shortcut row ---------------------------------------- */
.cc-industry-section {
  padding: 80px 0;
  border-top: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
}
.cc-industry-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border-left: 1px solid var(--borderColor);
}
.cc-industry-grid--mobile {
  grid-template-columns: repeat(2, 1fr);
  border-top: 1px solid var(--borderColor);
  border-left: 1px solid var(--borderColor);
}
.cc-industry {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 28px 24px;
  border-right: 1px solid var(--borderColor);
  border-bottom: 1px solid transparent;
  text-decoration: none;
  color: var(--textColor);
  background: var(--background);
  transition: background-color 120ms ease;
  min-height: 168px;
}
.cc-industry-grid--mobile .cc-industry { border-bottom: 1px solid var(--borderColor); }
.cc-industry:hover { background: var(--alternateBackground); }
.cc-industry__num {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cc-industry__title {
  font-family: var(--headingFont);
  font-size: 18px;
  line-height: 1.2;
  letter-spacing: -0.005em;
  font-weight: 600;
  margin: 0;
  color: var(--textColor);
}
.cc-industry__note {
  font-size: 13px;
  line-height: 1.45;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: 0;
}
.cc-industry__arrow {
  margin-top: auto;
  font-size: 13px;
  color: var(--textColor);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.cc-industry__arrow .arrow {
  transition: transform 160ms ease;
}
.cc-industry:hover .cc-industry__arrow .arrow { transform: translateX(3px); }

/* ---- brand index --------------------------------------------------- */
.cc-brand-index {
  padding: 96px 0;
  background: var(--alternateBackground);
}
.cc-brand-index__head {
  max-width: 1320px;
  margin: 0 auto 48px;
  padding: 0 32px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: end;
}
.cc-brand-index__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  gap: 48px;
}
.cc-brand-tier {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--textColor);
}
.cc-brand-tier__meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cc-brand-tier__num {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cc-brand-tier__name {
  font-family: var(--headingFont);
  font-size: 22px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  font-weight: 600;
  margin: 0;
  color: var(--textColor);
}
.cc-brand-tier__count {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.7);
}
.cc-brand-tier__rows {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}
.cc-brand-row {
  display: grid;
  grid-template-columns: 1.4fr 2fr 0.7fr;
  gap: 24px;
  align-items: baseline;
  padding: 14px 0;
  border-bottom: 1px solid var(--borderColor);
  text-decoration: none;
  color: var(--textColor);
  transition: padding-left 160ms ease, background-color 160ms ease;
}
.cc-brand-row:last-child { border-bottom: 0; }
.cc-brand-row:hover {
  padding-left: 8px;
  background-color: rgba(var(--textColor-rgb), 0.02);
}
.cc-brand-row__name {
  font-family: var(--headingFont);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--textColor);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.cc-brand-row__name .leaf {
  width: 12px; height: 12px;
  color: var(--saleBadgeBackground);
}
.cc-brand-row__cats {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.65);
  line-height: 1.4;
}
.cc-brand-row__status {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.7);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  justify-self: end;
}
.cc-brand-row__status .dot {
  width: 6px; height: 6px;
  border-radius: 99px;
  background: var(--saleBadgeBackground);
}
.cc-brand-row__status--stocked .dot {
  background: rgba(var(--textColor-rgb), 0.4);
}

.cc-brand-index__foot {
  max-width: 1320px;
  margin: 32px auto 0;
  padding: 24px 32px 0;
  border-top: 1px solid var(--borderColor);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  font-size: 14px;
  color: rgba(var(--textColor-rgb), 0.7);
}

/* ---- OECM bar (mirrors locked homepage .hp-oecm composition) ------- */
.cc-oecm {
  padding: 56px 0;
  background: var(--background);
  border-top: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
}
.cc-oecm__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 48px;
  align-items: center;
}
.cc-oecm__lead { display: flex; flex-direction: column; gap: 16px; }
.cc-oecm__copy {
  font-size: 17px;
  line-height: 1.5;
  color: var(--textColor);
  margin: 0;
  max-width: 60ch;
}
.cc-oecm__meta { justify-self: end; }

/* ---- footer separator (template-2 scope only) ----------------------
   On this template the page ends with two back-to-back .scheme-inverse
   sections (.bbi-cta-section then .bbi-footer), which merge into one
   ~290px charcoal slab. A 1px hairline using the inverse --borderColor
   (resolves to #1F1F21 under .scheme-inverse) restores the edge.
   Scoped to .cc-page so the locked homepage is untouched.
   -------------------------------------------------------------------- */
.cc-page .bbi-footer { border-top: 1px solid var(--borderColor); }

/* ---- mobile (375) overrides ---------------------------------------- */
.cc-page--mobile .cc-intro { padding: 40px 0 32px; }
.cc-page--mobile .cc-intro__grid {
  grid-template-columns: 1fr;
  gap: 32px;
  padding: 0 16px;
}
.cc-page--mobile .cc-intro__title {
  font-size: 36px;
}
.cc-page--mobile .cc-cat-section { padding: 16px 0 56px; }
.cc-page--mobile .cc-cat-section .bbi-container { padding: 0 16px; }
.cc-page--mobile .cc-industry-section { padding: 48px 0; }
.cc-page--mobile .cc-industry-section .bbi-container { padding: 0 16px; }
.cc-page--mobile .cc-brand-index { padding: 56px 0; }
.cc-page--mobile .cc-brand-index__head {
  grid-template-columns: 1fr;
  gap: 24px;
  padding: 0 16px;
  margin-bottom: 32px;
}
.cc-page--mobile .cc-brand-index__inner { padding: 0 16px; gap: 32px; }
.cc-page--mobile .cc-brand-tier {
  grid-template-columns: 1fr;
  gap: 16px;
}
.cc-page--mobile .cc-brand-row {
  grid-template-columns: 1fr;
  gap: 4px;
}
.cc-page--mobile .cc-brand-row__status { justify-self: start; }
.cc-page--mobile .cc-brand-index__foot {
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
  padding: 24px 16px 0;
}
.cc-page--mobile .cc-oecm { padding: 32px 0; }
.cc-page--mobile .cc-oecm__inner {
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 0 16px;
}
.cc-page--mobile .cc-oecm__meta { justify-self: start; }
.cc-page--mobile .cc-crumb-band__inner { padding: 12px 16px; }

/* mobile section-head reflow */
.cc-page--mobile .bbi-section-head {
  flex-direction: column;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 24px;
}
.cc-page--mobile .bbi-section-head__title {
  font-size: 28px;
}

/* ---- CTA closer reflow on mobile ----------------------------------- */
.cc-page--mobile .bbi-cta-section__inner {
  grid-template-columns: 1fr;
  gap: 32px;
  padding: 56px 16px;
}
.cc-page--mobile .bbi-cta-section__heading {
  font-size: 32px;
}


/* ===== collection.css ===== */
/* ============================================================
   collection.css — template 3 scoped styles
   /collections/seating (and any single-category collection page)
   Composes only tokens + Phase-2 patterns. No new tokens.
   ============================================================ */

/* ===== page root ===== */
.cn-page {
  background: var(--background);
  color: var(--textColor);
  font-family: var(--bodyFont);
}

/* ===== breadcrumbs band (mirrors .cc-crumb-band shape) ===== */
.cn-crumb-band {
  border-bottom: 1px solid var(--borderColor);
  background: var(--background);
}
.cn-crumb-band__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: var(--space-4) 32px;
}
.cn-page--mobile .cn-crumb-band__inner { padding: var(--space-3) 20px; }

/* ===== intro band ===== */
.cn-intro {
  padding: var(--space-16) 32px var(--space-12);
  border-bottom: 1px solid var(--borderColor);
}
.cn-page--mobile .cn-intro {
  padding: var(--space-12) 20px var(--space-8);
}
.cn-intro__inner {
  max-width: 1320px;
  margin: 0 auto;
}
.cn-intro__grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
  gap: var(--space-16);
  align-items: end;
}
.cn-page--mobile .cn-intro__grid {
  grid-template-columns: 1fr;
  gap: var(--space-8);
}
.cn-intro__eyebrow {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
  margin: 0 0 var(--space-4);
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
}
.cn-intro__eyebrow::before {
  content: "";
  width: 24px; height: 1px;
  background: var(--saleBadgeBackground);
}
.cn-intro__title {
  font-family: var(--headingFont);
  font-size: var(--fs-h1);
  line-height: var(--lh-h1);
  letter-spacing: var(--ls-h1);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0 0 var(--space-6);
  text-wrap: balance;
}
.cn-intro__deck {
  font-size: 19px;
  line-height: 1.5;
  color: rgba(var(--textColor-rgb), 0.78);
  max-width: 56ch;
  margin: 0 0 var(--space-4);
}
.cn-page--mobile .cn-intro__deck { font-size: 17px; }
.cn-intro__meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-4) var(--space-8);
  margin-top: var(--space-6);
  padding-top: var(--space-6);
  border-top: 1px solid var(--borderColor);
}
.cn-intro__metaitem {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cn-intro__metakey {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-intro__metaval {
  font-size: 15px;
  font-weight: 500;
  color: var(--textColor);
}
.cn-intro__media {
  position: relative;
  border-radius: var(--cardRadius);
  overflow: hidden;
}

/* ===== filter / sort toolbar ===== */
.cn-toolbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--background);
  border-bottom: 1px solid var(--borderColor);
}
.cn-toolbar__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}
.cn-page--mobile .cn-toolbar__inner { padding: 0 20px; }

/* facet row — chips + sort */
.cn-toolbar__row {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-4) 0;
  flex-wrap: wrap;
}
.cn-page--mobile .cn-toolbar__row {
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  padding: var(--space-3) 0;
}
.cn-page--mobile .cn-toolbar__row::-webkit-scrollbar { display: none; }

.cn-toolbar__label {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
  flex: 0 0 auto;
}

/* facet pill — square-ish, hairline border */
.cn-facet {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  height: 36px;
  padding: 0 var(--space-3);
  border: 1px solid var(--borderColor);
  border-radius: var(--inputRadius);
  background: var(--background);
  color: var(--textColor);
  font-family: var(--bodyFont);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex: 0 0 auto;
  transition: border-color 120ms ease, background 120ms ease;
}
.cn-facet:hover { border-color: rgba(var(--textColor-rgb), 0.5); }
.cn-facet[aria-expanded="true"],
.cn-facet--open {
  background: var(--textColor);
  color: var(--background);
  border-color: var(--textColor);
}
.cn-facet__count {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  font-weight: 500;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-facet[aria-expanded="true"] .cn-facet__count,
.cn-facet--open .cn-facet__count { color: rgba(255,255,255,0.6); }
.cn-facet__caret {
  display: inline-block;
  font-size: 9px;
  margin-left: 2px;
  transform: translateY(-1px);
}
.cn-facet--toggle {
  /* "Canadian-made" boolean toggle — no caret */
}
.cn-facet--toggle.cn-facet--on {
  background: var(--textColor);
  color: var(--background);
  border-color: var(--textColor);
}
.cn-facet--toggle .leaf {
  width: 12px; height: 12px;
  color: var(--saleBadgeBackground);
}
.cn-facet--toggle.cn-facet--on .leaf {
  color: #fff;
}

/* the sub-category chip-row — visible at rest, lives in toolbar */
.cn-subchips {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) 0 var(--space-4);
  border-bottom: 1px dashed rgba(var(--borderColor-rgb), 1);
  flex-wrap: wrap;
}
.cn-page--mobile .cn-subchips {
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: var(--space-3);
}
.cn-page--mobile .cn-subchips::-webkit-scrollbar { display: none; }
.cn-subchips__lead {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
  flex: 0 0 auto;
  margin-right: var(--space-2);
}
.cn-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 30px;
  padding: 0 var(--space-3);
  border: 1px solid var(--borderColor);
  border-radius: 999px;
  background: var(--background);
  color: rgba(var(--textColor-rgb), 0.78);
  font-family: var(--bodyFont);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex: 0 0 auto;
  transition: border-color 120ms ease, color 120ms ease, background 120ms ease;
}
.cn-chip:hover { border-color: rgba(var(--textColor-rgb), 0.5); color: var(--textColor); }
.cn-chip--on {
  background: var(--textColor);
  color: var(--background);
  border-color: var(--textColor);
}
.cn-chip__count {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 10.5px;
  color: rgba(var(--textColor-rgb), 0.5);
}
.cn-chip--on .cn-chip__count { color: rgba(255,255,255,0.55); }
.cn-chip--all { /* "All" reset chip — same shape */ }

/* expanded facet panel — pinned under the toolbar */
.cn-facet-panel {
  border-top: 1px solid var(--borderColor);
  background: var(--background);
  padding: var(--space-6) 0;
}
.cn-facet-panel__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3) var(--space-8);
  max-width: 960px;
}
.cn-page--mobile .cn-facet-panel__grid {
  grid-template-columns: 1fr 1fr;
}
.cn-facet-panel__item {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-3);
  padding: var(--space-2) 0;
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
  font-size: 14px;
  color: var(--textColor);
  cursor: pointer;
}
.cn-facet-panel__item:hover { color: var(--linkColor); }
.cn-facet-panel__count {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  color: rgba(var(--textColor-rgb), 0.5);
}
.cn-facet-panel__foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: var(--space-6);
  padding-top: var(--space-4);
  border-top: 1px solid var(--borderColor);
}
.cn-facet-panel__hint {
  font-size: 12px;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-facet-panel__close {
  font-family: var(--bodyFont);
  font-size: 13px;
  font-weight: 500;
  color: var(--textColor);
  background: transparent;
  border: 0;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* result-state strip — count + sort, attached below the chip row */
.cn-state {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) 0 var(--space-4);
  gap: var(--space-4);
}
.cn-state__count {
  font-size: 14px;
  color: rgba(var(--textColor-rgb), 0.78);
}
.cn-state__count b { color: var(--textColor); font-weight: 600; }
.cn-state__sort {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 14px;
}
.cn-state__sort label {
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-state__sort-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 0;
  padding: 6px 0;
  font-family: var(--bodyFont);
  font-size: 14px;
  font-weight: 600;
  color: var(--textColor);
  cursor: pointer;
  border-bottom: 1px solid var(--textColor);
}
.cn-state__sort-trigger .caret { font-size: 10px; transform: translateY(-1px); }
.cn-page--mobile .cn-state {
  flex-wrap: wrap;
  gap: var(--space-2);
}

/* ===== product grid section ===== */
.cn-grid-section {
  padding: var(--space-12) 32px var(--space-16);
}
.cn-page--mobile .cn-grid-section {
  padding: var(--space-8) 20px var(--space-12);
}
.cn-grid-section__inner {
  max-width: 1320px;
  margin: 0 auto;
}
.cn-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--space-8);
}
.cn-page--mobile .cn-grid {
  grid-template-columns: 1fr;
  gap: var(--space-6);
}

/* product card extends .bbi-card--product — only adds the data-driven row */
.cn-card__row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--borderColor);
}
.cn-card__price {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.cn-card__price-label {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.5);
}
.cn-card__price-val {
  font-family: var(--headingFont);
  font-size: 17px;
  font-weight: 600;
  color: var(--textColor);
  letter-spacing: -0.01em;
}
.cn-card__price-val--quote {
  font-family: var(--bodyFont);
  font-size: 14px;
  font-weight: 500;
  color: rgba(var(--textColor-rgb), 0.78);
  font-style: italic;
}
.cn-card__cta-pair {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.cn-card__cta-secondary {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: rgba(var(--textColor-rgb), 0.55);
}

/* meta line under brand — model code + warranty */
.cn-card__meta {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-top: 2px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: rgba(var(--textColor-rgb), 0.5);
}
.cn-card__meta .sep {
  width: 3px; height: 3px; border-radius: 99px;
  background: rgba(var(--textColor-rgb), 0.3);
}

/* ===== pagination ===== */
.cn-pager {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: var(--space-12);
  margin-top: var(--space-12);
  border-top: 1px solid var(--borderColor);
  gap: var(--space-4);
}
.cn-page--mobile .cn-pager {
  flex-direction: column;
  align-items: stretch;
  gap: var(--space-6);
  padding-top: var(--space-8);
  margin-top: var(--space-8);
}
.cn-pager__nums {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.cn-pager__num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid var(--borderColor);
  background: var(--background);
  color: var(--textColor);
  font-family: var(--bodyFont);
  font-size: 14px;
  font-weight: 500;
  border-radius: var(--inputRadius);
  cursor: pointer;
  text-decoration: none;
}
.cn-pager__num:hover { border-color: rgba(var(--textColor-rgb), 0.5); }
.cn-pager__num--current {
  background: var(--textColor);
  color: var(--background);
  border-color: var(--textColor);
}
.cn-pager__num--ellipsis {
  border: 0;
  background: transparent;
  cursor: default;
  color: rgba(var(--textColor-rgb), 0.5);
}
.cn-pager__edge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 var(--space-3);
  height: 36px;
  font-family: var(--bodyFont);
  font-size: 14px;
  font-weight: 500;
  color: var(--textColor);
  background: transparent;
  border: 1px solid var(--borderColor);
  border-radius: var(--inputRadius);
  cursor: pointer;
  text-decoration: none;
}
.cn-pager__edge:hover { border-color: rgba(var(--textColor-rgb), 0.5); }
.cn-pager__edge--disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}
.cn-pager__count {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-page--mobile .cn-pager__count { text-align: center; }

/* ===== brand strip ===== */
.cn-brandstrip {
  background: var(--alternateBackground);
  padding: var(--space-12) 32px;
  border-top: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
}
.cn-page--mobile .cn-brandstrip { padding: var(--space-8) 20px; }
.cn-brandstrip__inner {
  max-width: 1320px;
  margin: 0 auto;
}
.cn-brandstrip__head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: var(--space-6);
  gap: var(--space-4);
}
.cn-page--mobile .cn-brandstrip__head { flex-wrap: wrap; }
.cn-brandstrip__title {
  font-family: var(--headingFont);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--headingColor);
  margin: 0;
}
.cn-brandstrip__sub {
  font-size: 14px;
  color: rgba(var(--textColor-rgb), 0.7);
}
.cn-brandstrip__grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--space-2);
  border-left: 1px solid var(--borderColor);
  border-top: 1px solid var(--borderColor);
}
.cn-page--mobile .cn-brandstrip__grid {
  grid-template-columns: repeat(2, 1fr);
}
.cn-brand-plate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 100px;
  background: var(--background);
  border-right: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
  text-decoration: none;
  color: var(--textColor);
  transition: background 120ms ease;
  position: relative;
}
.cn-brand-plate:hover { background: rgba(var(--textColor-rgb), 0.02); }
.cn-brand-plate__name {
  font-family: var(--headingFont);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.005em;
  color: var(--textColor);
}
.cn-brand-plate__count {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  color: rgba(var(--textColor-rgb), 0.55);
}
.cn-brand-plate__leaf {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 12px;
  height: 12px;
  color: var(--saleBadgeBackground);
}

/* ===== OECM bar (mirrors .cc-oecm shape exactly) ===== */
.cn-oecm {
  background: var(--background);
  padding: var(--space-12) 32px;
  border-bottom: 1px solid var(--borderColor);
}
.cn-page--mobile .cn-oecm { padding: var(--space-8) 20px; }
.cn-oecm__inner {
  max-width: 1320px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) auto;
  gap: var(--space-12);
  align-items: center;
}
.cn-page--mobile .cn-oecm__inner {
  grid-template-columns: 1fr;
  gap: var(--space-6);
}
.cn-oecm__lead {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
  align-items: flex-start;
}
.cn-oecm__copy {
  font-size: 16px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.78);
  margin: 0;
}

/* ===== mobile-only filter sheet trigger (optional decoration) ===== */
.cn-page--mobile .cn-toolbar__row .cn-facet:first-child {
  /* "Filters" master pill on mobile gets emphasized */
}


/* ===== landing.css ===== */
/* ============================================================
   Landing page (template 4) styles
   Composes ONLY tokens + .bbi-* skins. No new tokens.
   Scoped under .lp-page; .lp-* atoms are template-specific only.
   ============================================================ */

.lp-page {
  background: var(--background);
  color: var(--textColor);
}

/* ---------- Breadcrumbs band (reuses .bbi-crumbs from components) ---------- */
.lp-crumbs-band {
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
.lp-crumbs-band__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: var(--space-3) var(--space-6);
}

/* ---------- HERO ---------- */
.lp-hero {
  padding: var(--space-12) 0 var(--space-12);
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
.lp-hero__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--space-6);
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
  gap: var(--space-12);
  align-items: center;
}
.lp-hero__text { max-width: 560px; }
.lp-hero__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}
.lp-hero__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-hero__eyebrow-label {
  color: rgba(var(--textColor-rgb), 0.6);
}
.lp-hero h1 {
  font-family: var(--headingFont);
  font-size: var(--fs-h1);
  line-height: var(--lh-h1);
  letter-spacing: var(--ls-h1);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0 0 var(--space-4);
  text-wrap: balance;
}
.lp-hero__standfirst {
  font-size: 18px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.78);
  margin: 0 0 var(--space-6);
  text-wrap: pretty;
}
.lp-hero__badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 6px 12px;
  border: 1px solid rgba(var(--borderColor-rgb), 0.8);
  border-radius: 999px;
  margin-bottom: var(--space-6);
  font-size: 12px;
  color: rgba(var(--textColor-rgb), 0.78);
}
.lp-hero__badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--saleBadgeBackground);
}
.lp-hero__cta-row {
  display: flex;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.lp-hero__media {
  position: relative;
  aspect-ratio: 5 / 4;
  background: var(--alternateBackground);
  border-radius: var(--cardRadius);
  overflow: hidden;
}
.lp-hero__media-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    linear-gradient(135deg, rgba(var(--textColor-rgb), 0.04) 0%, rgba(var(--textColor-rgb), 0.10) 100%),
    repeating-linear-gradient(45deg,
      rgba(var(--shadowColor-rgb), 0.03) 0px,
      rgba(var(--shadowColor-rgb), 0.03) 2px,
      transparent 2px,
      transparent 12px);
  color: rgba(var(--textColor-rgb), 0.5);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.lp-hero__caption {
  position: absolute;
  left: var(--space-4);
  bottom: var(--space-4);
  background: rgba(var(--shadowColor-rgb), 0.7);
  color: var(--background);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
}
.lp-hero__caption-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--saleBadgeBackground);
}

/* ---------- INTRO band (memo-style copy) ---------- */
.lp-intro {
  padding: var(--space-12) 0;
}
.lp-intro__inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}
.lp-intro__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: rgba(var(--textColor-rgb), 0.6);
  margin-bottom: var(--space-4);
}
.lp-intro__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-intro h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0 0 var(--space-6);
  text-wrap: balance;
}
.lp-intro__body p {
  font-size: 17px;
  line-height: 1.6;
  color: rgba(var(--textColor-rgb), 0.78);
  margin: 0 0 var(--space-4);
  text-wrap: pretty;
}
.lp-intro__body a {
  color: var(--linkColor);
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ---------- DIFFERENTIATOR cards (skins .bbi-card) ---------- */
.lp-diff {
  padding: var(--space-12) 0;
  background: var(--alternateBackground);
  border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
.lp-diff__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}
.lp-diff__head {
  margin-bottom: var(--space-8);
  max-width: 640px;
}
.lp-diff__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: rgba(var(--textColor-rgb), 0.6);
  margin-bottom: var(--space-3);
}
.lp-diff__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-diff h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
  text-wrap: balance;
}
.lp-diff__grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
  border-left: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
/* skins .bbi-card by overriding only what's template-specific */
.lp-diff-card {
  background: var(--cardBackground);
  padding: var(--space-8);
  border-right: 1px solid rgba(var(--borderColor-rgb), 0.6);
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
  border-radius: 0;
  display: grid;
  grid-template-rows: auto auto auto 1fr;
  gap: var(--space-3);
  transition: background-color 160ms ease;
}
.lp-diff-card:hover {
  background: rgba(var(--shadowColor-rgb), 0.02);
}
.lp-diff-card__num {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: rgba(var(--textColor-rgb), 0.6);
}
.lp-diff-card__icon {
  width: 32px; height: 32px;
  color: var(--textColor);
  display: flex;
  align-items: center;
  justify-content: flex-start;
}
.lp-diff-card__label {
  font-family: var(--headingFont);
  font-size: 22px;
  line-height: 1.3;
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}
.lp-diff-card__label::after {
  content: "";
  display: block;
  width: 24px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-diff-card__sentence {
  font-size: 15px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: 0;
  text-wrap: pretty;
}

/* ---------- TRUST PHOTO ROW ---------- */
.lp-trust-row {
  padding: var(--space-12) 0;
}
.lp-trust-row__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}
.lp-trust-row__head {
  margin-bottom: var(--space-6);
  max-width: 640px;
}
.lp-trust-row__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: rgba(var(--textColor-rgb), 0.6);
  margin-bottom: var(--space-3);
}
.lp-trust-row__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-trust-row h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h3);
  line-height: var(--lh-h3);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
}
.lp-trust-row__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-4);
}
.lp-trust-row__cell {
  position: relative;
  aspect-ratio: 4 / 3;
  background: var(--alternateBackground);
  border-radius: var(--cardRadius);
  overflow: hidden;
}
.lp-trust-row__cell-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    repeating-linear-gradient(45deg,
      rgba(var(--shadowColor-rgb), 0.04) 0px,
      rgba(var(--shadowColor-rgb), 0.04) 2px,
      transparent 2px,
      transparent 12px);
  color: rgba(var(--textColor-rgb), 0.5);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.lp-trust-row__caption {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: rgba(var(--shadowColor-rgb), 0.85);
  color: var(--background);
  padding: 10px 14px;
  font-size: 12px;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.lp-trust-row__caption-key {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--background-rgb), 0.6);
}

/* ---------- PROOF BAR ---------- */
.lp-proof-bar {
  background: var(--alternateBackground);
  border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
.lp-proof-bar__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: var(--space-8) var(--space-6);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-8);
}
.lp-proof-bar__stat {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  position: relative;
}
.lp-proof-bar__stat + .lp-proof-bar__stat {
  border-left: 1px solid rgba(var(--borderColor-rgb), 0.6);
  padding-left: var(--space-8);
}
.lp-proof-bar__stat-num {
  font-family: var(--headingFont);
  font-size: 40px;
  line-height: 1;
  font-weight: 600;
  color: var(--headingColor);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.lp-proof-bar__stat-num::before {
  content: "";
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-proof-bar__stat-label {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.6);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.lp-proof-bar__stat-detail {
  font-size: 14px;
  color: rgba(var(--textColor-rgb), 0.78);
  line-height: 1.5;
  margin-top: var(--space-2);
}

/* ---------- CROSS-LINKS strip ---------- */
.lp-crosslinks {
  padding: var(--space-12) 0;
}
.lp-crosslinks__inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}
.lp-crosslinks__head {
  margin-bottom: var(--space-6);
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: var(--space-6);
}
.lp-crosslinks__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: rgba(var(--textColor-rgb), 0.6);
  margin-bottom: var(--space-3);
}
.lp-crosslinks__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-crosslinks h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h3);
  line-height: var(--lh-h3);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
}
.lp-crosslinks__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-4);
}
.lp-crosslinks__tile {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-6);
  background: var(--background);
  border: 1px solid rgba(var(--borderColor-rgb), 0.8);
  border-radius: var(--cardRadius);
  text-decoration: none;
  color: var(--textColor);
  transition: background-color 160ms ease, border-color 160ms ease;
}
.lp-crosslinks__tile:hover {
  background: var(--alternateBackground);
  border-color: rgba(var(--borderColor-rgb), 1);
}
.lp-crosslinks__tile-icon {
  width: 28px; height: 28px;
  color: rgba(var(--textColor-rgb), 0.55);
}
.lp-crosslinks__tile-label {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.lp-crosslinks__tile-name {
  font-family: var(--headingFont);
  font-size: 18px;
  font-weight: 600;
  color: var(--headingColor);
}
.lp-crosslinks__tile-meta {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.6);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  letter-spacing: 0.04em;
}
.lp-crosslinks__tile-arrow {
  width: 18px; height: 18px;
  color: rgba(var(--textColor-rgb), 0.55);
  transition: transform 160ms ease;
}
.lp-crosslinks__tile:hover .lp-crosslinks__tile-arrow {
  transform: translateX(4px);
  color: var(--textColor);
}

/* ---------- FAQ accordion ---------- */
.lp-faq {
  padding: var(--space-12) 0;
  background: var(--background);
  border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
}
.lp-faq__inner {
  max-width: 880px;
  margin: 0 auto;
  padding: 0 var(--space-6);
}
.lp-faq__head {
  margin-bottom: var(--space-6);
}
.lp-faq__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  color: rgba(var(--textColor-rgb), 0.6);
  margin-bottom: var(--space-3);
}
.lp-faq__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.lp-faq h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
}
.lp-faq__list {
  border-top: 1px solid rgba(var(--borderColor-rgb), 0.8);
}
.lp-faq__item {
  border-bottom: 1px solid rgba(var(--borderColor-rgb), 0.8);
}
.lp-faq__trigger {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--space-4);
  width: 100%;
  padding: var(--space-6) 0;
  background: transparent;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: var(--headingFont);
  font-size: 17px;
  font-weight: 600;
  color: var(--headingColor);
}
.lp-faq__trigger-num {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: rgba(var(--textColor-rgb), 0.55);
  font-weight: 400;
}
.lp-faq__item--open .lp-faq__trigger-num {
  color: var(--textColor);
}
.lp-faq__item--open .lp-faq__trigger-num::after {
  content: "";
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--saleBadgeBackground);
  vertical-align: middle;
  margin-left: var(--space-2);
}
.lp-faq__chevron {
  width: 16px; height: 16px;
  color: rgba(var(--textColor-rgb), 0.55);
  transition: transform 200ms ease, color 160ms ease;
}
.lp-faq__item--open .lp-faq__chevron {
  transform: rotate(180deg);
  color: var(--textColor);
}
.lp-faq__answer {
  /* Option A: transparent panel; hierarchy comes from open-Q chip + chevron rotation */
  padding: var(--space-4) 0 var(--space-5) calc(36px + var(--space-4));
  font-size: 15px;
  line-height: 1.6;
  color: rgba(var(--textColor-rgb), 0.78);
}
.lp-faq__answer p {
  margin: 0 0 var(--space-3);
  text-wrap: pretty;
}
.lp-faq__answer p:last-child { margin-bottom: 0; }

/* ---------- BREAKPOINTS ---------- */
@media (max-width: 980px) {
  .lp-hero__inner {
    grid-template-columns: 1fr;
    gap: var(--space-8);
  }
  .lp-hero__media { aspect-ratio: 16 / 10; }
  .lp-diff__grid { grid-template-columns: 1fr; }
  .lp-trust-row__grid { grid-template-columns: 1fr; }
  .lp-proof-bar__inner { grid-template-columns: 1fr; gap: var(--space-6); }
  .lp-proof-bar__stat + .lp-proof-bar__stat {
    border-left: none;
    border-top: 1px solid rgba(var(--borderColor-rgb), 0.6);
    padding-left: 0;
    padding-top: var(--space-6);
  }
  .lp-crosslinks__grid { grid-template-columns: 1fr; }
  .lp-crosslinks__head { flex-direction: column; align-items: start; }
}

@media (max-width: 640px) {
  .lp-hero { padding: var(--space-8) 0; }
  .lp-hero h1 { font-size: 32px; }
  .lp-intro, .lp-diff, .lp-trust-row, .lp-crosslinks, .lp-faq {
    padding: var(--space-8) 0;
  }
  .lp-diff-card { padding: var(--space-6); }
  .lp-proof-bar__stat-num { font-size: 32px; }
}


/* ===== pdp.css ===== */
/* ============================================================
   pdp.css — template 5 scoped styles
   Product Detail Page (unbuyable variant canonical, buyable swap data-driven)
   Composes ONLY tokens from tokens.css and patterns from
   bbi-components.css. No new tokens. No additions to bbi-components.css.
   New template-scoped classes — all .pd-* prefix.
   ============================================================ */

.pd-page {
  background: var(--background);
  color: var(--textColor);
  font-family: var(--bodyFont);
}

/* ---------- breadcrumbs band ---------- */
.pd-crumb-band {
  border-bottom: 1px solid var(--borderColor);
  background: var(--background);
}
.pd-crumb-band__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: var(--space-4) 32px;
}
.pd-page--mobile .pd-crumb-band__inner { padding: var(--space-3) 16px; }

/* ---------- HERO band (split 60/40 desktop) ---------- */
.pd-hero {
  padding: var(--space-12) 0 var(--space-12);
  border-bottom: 1px solid var(--borderColor);
}
.pd-hero__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr);
  gap: var(--space-12);
  align-items: start;
}
.pd-page--mobile .pd-hero { padding: var(--space-8) 0; }
.pd-page--mobile .pd-hero__inner {
  grid-template-columns: 1fr;
  gap: var(--space-8);
  padding: 0 16px;
}

/* ---------- GALLERY (main image + thumb strip) ---------- */
.pd-gallery {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.pd-gallery__main {
  position: relative;
  aspect-ratio: 4 / 5;
  background: var(--alternateBackground);
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  overflow: hidden;
}
.pd-page--mobile .pd-gallery__main { aspect-ratio: 1 / 1; }
.pd-gallery__main .bbi-ph { aspect-ratio: auto; height: 100%; }

.pd-gallery__thumbs {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: var(--space-2);
}
.pd-page--mobile .pd-gallery__thumbs {
  grid-template-columns: repeat(4, minmax(72px, 1fr));
  overflow-x: auto;
  scrollbar-width: none;
}
.pd-page--mobile .pd-gallery__thumbs::-webkit-scrollbar { display: none; }
.pd-gallery__thumb {
  position: relative;
  aspect-ratio: 1 / 1;
  background: var(--alternateBackground);
  border: 1px solid var(--borderColor);
  border-radius: var(--inputRadius);
  overflow: hidden;
  cursor: pointer;
  padding: 0;
}
.pd-gallery__thumb .bbi-ph { aspect-ratio: auto; height: 100%; }
.pd-gallery__thumb:hover { border-color: rgba(var(--textColor-rgb), 0.5); }
.pd-gallery__thumb--active {
  border-color: var(--textColor);
  border-width: 2px;
}
/* hide thumb strip when only one image in gallery (empty-state grace) */
.pd-gallery--single .pd-gallery__thumbs { display: none; }

/* ---------- PRODUCT INFO column (right) ---------- */
.pd-product {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  position: sticky;
  top: var(--space-6);
}
.pd-page--mobile .pd-product { position: static; }

.pd-product__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
  margin: 0;
}
.pd-product__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.pd-product__eyebrow a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid currentColor;
}
.pd-product__brand-parent {
  font-size: 12px;
  color: rgba(var(--textColor-rgb), 0.55);
  margin: 0;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  letter-spacing: 0.04em;
}
.pd-product__title {
  font-family: var(--headingFont);
  font-size: clamp(28px, 3.4vw, 44px);
  line-height: 1.1;
  letter-spacing: -0.015em;
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
  text-wrap: balance;
}
.pd-product__model {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: 0;
}
.pd-product__model b {
  color: var(--textColor);
  font-weight: 600;
}
.pd-product__model .sep {
  display: inline-block;
  margin: 0 6px;
  color: rgba(var(--textColor-rgb), 0.35);
}
.pd-product__badges {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  margin-top: var(--space-1);
}
.pd-product__standfirst {
  font-size: 16px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.78);
  margin: 0;
  text-wrap: pretty;
}

/* Sold-out chip — does NOT exist in bbi-components.css.
   Built here as .pd-badge--sold to keep components file untouched.
   Composes the global --soldBadgeBackground token (#5A5A5E, 6.74:1 AA on white). */
.pd-badge--sold {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 22px;
  padding: 0 10px;
  font-family: var(--headingFont);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
  white-space: nowrap;
  background: var(--soldBadgeBackground);
  color: #FFFFFF;
}

/* ---------- COMMERCE block (unbuyable canonical + buyable swap) ---------- */
.pd-commerce {
  margin-top: var(--space-3);
  padding: var(--space-6);
  background: var(--alternateBackground);
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.pd-commerce__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.65);
  margin: 0;
}
.pd-commerce__eyebrow::before {
  content: "";
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--saleBadgeBackground);
}
.pd-commerce__heading {
  font-family: var(--headingFont);
  font-size: 22px;
  line-height: 1.25;
  letter-spacing: -0.005em;
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
}
.pd-commerce__sub {
  font-size: 14px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.78);
  margin: 0;
}
.pd-commerce__primary {
  width: 100%;
  margin-top: var(--space-2);
}
.pd-commerce__secondary {
  align-self: flex-start;
  margin-top: var(--space-1);
  font-family: var(--bodyFont);
  font-size: 14px;
  font-weight: 600;
  color: var(--textColor);
  text-decoration: none;
  border-bottom: 1px solid var(--textColor);
  padding: 2px 0;
}
.pd-commerce__secondary b { font-weight: 600; }
.pd-commerce__trust {
  font-size: 12px;
  line-height: 1.5;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: var(--space-2) 0 0;
  display: inline-flex;
  align-items: flex-start;
  gap: 8px;
}
.pd-commerce__trust .dot {
  flex: 0 0 auto;
  margin-top: 6px;
  width: 6px; height: 6px;
  border-radius: 99px;
  background: var(--saleBadgeBackground);
}

/* Buyable variant — price block + qty stepper + stock indicator */
.pd-commerce--buyable .pd-commerce__price {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  margin: 0;
}
.pd-commerce--buyable .pd-commerce__price-val {
  font-family: var(--headingFont);
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--textColor);
}
.pd-commerce--buyable .pd-commerce__price-unit {
  font-size: 13px;
  color: rgba(var(--textColor-rgb), 0.6);
}
.pd-commerce--buyable .pd-commerce__stock {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.78);
}
.pd-commerce--buyable .pd-commerce__stock .dot {
  width: 6px; height: 6px;
  border-radius: 99px;
  background: var(--success);
}
.pd-commerce__qty {
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--inputBorder);
  border-radius: var(--inputRadius);
  overflow: hidden;
  align-self: flex-start;
}
.pd-commerce__qty-btn {
  width: 36px; height: 40px;
  background: var(--inputBackground);
  color: var(--inputColor);
  border: 0;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}
.pd-commerce__qty-btn:hover { background: var(--alternateBackground); }
.pd-commerce__qty-val {
  width: 48px;
  text-align: center;
  font-family: var(--bodyFont);
  font-size: 15px;
  font-weight: 600;
  color: var(--inputColor);
  border: 0;
  border-left: 1px solid var(--borderColor);
  border-right: 1px solid var(--borderColor);
  background: var(--inputBackground);
  height: 40px;
}
.pd-commerce__qty-row {
  display: flex;
  gap: var(--space-3);
  align-items: center;
}
.pd-commerce__qty-row .pd-commerce__primary { width: auto; flex: 1 1 auto; margin-top: 0; }

/* ---------- DESCRIPTION / story block ---------- */
.pd-description {
  padding: var(--space-12) 0;
  background: var(--background);
}
.pd-description__inner {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 32px;
}
.pd-page--mobile .pd-description { padding: var(--space-8) 0; }
.pd-page--mobile .pd-description__inner { padding: 0 16px; }
.pd-description__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
  margin: 0 0 var(--space-4);
}
.pd-description__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.pd-description__h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0 0 var(--space-6);
  text-wrap: balance;
}
.pd-description__body p {
  font-size: 17px;
  line-height: 1.6;
  color: rgba(var(--textColor-rgb), 0.82);
  margin: 0 0 var(--space-4);
  text-wrap: pretty;
}
.pd-description__body p:last-child { margin-bottom: 0; }
.pd-description__bestfor {
  margin-top: var(--space-6);
  padding-top: var(--space-6);
  border-top: 1px solid var(--borderColor);
  font-family: var(--headingFont);
  font-size: 17px;
  line-height: 1.5;
  font-weight: 500;
  color: var(--textColor);
}
.pd-description__bestfor b {
  font-weight: 600;
  display: block;
  margin-bottom: var(--space-2);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
}

/* ---------- SPEC TABLE (full-width, label 28% / value 72%) ---------- */
.pd-specs {
  padding: var(--space-12) 0;
  background: var(--alternateBackground);
  border-top: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
}
.pd-page--mobile .pd-specs { padding: var(--space-8) 0; }
.pd-specs__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
}
.pd-page--mobile .pd-specs__inner { padding: 0 16px; }
.pd-specs__head {
  margin-bottom: var(--space-8);
  max-width: 640px;
}
.pd-specs__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
  margin: 0 0 var(--space-3);
}
.pd-specs__eyebrow::before {
  content: "";
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--saleBadgeBackground);
}
.pd-specs__h2 {
  font-family: var(--headingFont);
  font-size: var(--fs-h2);
  line-height: var(--lh-h2);
  font-weight: 600;
  color: var(--headingColor);
  margin: 0;
}
.pd-specs__table {
  border-top: 1px solid var(--textColor);
}
.pd-spec-row {
  display: grid;
  grid-template-columns: 28% 72%;
  gap: var(--space-6);
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--borderColor);
  align-items: baseline;
}
.pd-page--mobile .pd-spec-row {
  grid-template-columns: 1fr;
  gap: var(--space-1);
  padding: var(--space-3) 0;
}
.pd-spec-row__label {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.6);
  font-weight: 500;
}
.pd-spec-row__value {
  font-size: 15px;
  line-height: 1.55;
  color: var(--textColor);
}
.pd-spec-row__value ul {
  list-style: none;

/* ---------- breadcrumbs ----------------------------------------------- */
function LpBreadcrumbs({ items }) {
  return (
    <div className="lp-crumbs-band">
      <div className="lp-crumbs-band__inner">
        <ol className="bbi-crumbs" aria-label="Breadcrumb">
          {items.map((c, i) => (
            <li key={i} {...(c.current ? { "aria-current": "page" } : {})}>
              {c.current ? c.label : <a href={c.href}>{c.label}</a>}
            </li>
          ))}
        </ol>
      </div>
    </div>
  );
}

/* ---------- FAQ accordion -------------------------------------------- */
function LpFAQItem({ idx, q, a, isOpen, onToggle }) {
  const num = String(idx + 1).padStart(2, "0");
  return (
    <div className={"lp-faq__item" + (isOpen ? " lp-faq__item--open" : "")}>
      <button className="lp-faq__trigger" aria-expanded={isOpen} onClick={onToggle}>
        <span className="lp-faq__trigger-num">{num}</span>
        <span>{q}</span>
        <span className="lp-faq__chevron"><IconChevronDown /></span>
      </button>
      {isOpen && (
        <div className="lp-faq__answer">
          <p>{a}</p>
        </div>
      )}
    </div>
  );
}

function LpFAQ({ data }) {
  const [open, setOpen] = useState(0);
  const { eyebrow, h2, items } = data;
  return (
    <section className="lp-faq" aria-label="Frequently asked questions">
      <div className="lp-faq__inner">
        <div className="lp-faq__head">
          <p className="lp-faq__eyebrow bbi-mono">{eyebrow}</p>
          <h2>{h2}</h2>
        </div>
        <div className="lp-faq__list">
          {items.map((f, i) => (
            <LpFAQItem
              key={i}
              idx={i}
              q={f.q}
              a={f.a}
              isOpen={open === i}
              onToggle={() => setOpen(open === i ? -1 : i)}
            />
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- CTA closer (reuses .bbi-cta-section verbatim) ------------ */
function LpCloser({ data }) {
  return (
    <section className="bbi-cta-section scheme-inverse">
      <div className="bbi-cta-section__inner">
        <div>
          <p className="bbi-cta-section__eyebrow">{data.eyebrow}</p>
          <h2 className="bbi-cta-section__heading">{data.h2}</h2>
          <p className="bbi-cta-section__sub">{data.sub}</p>
        </div>
        <div className="bbi-cta-section__actions">
          <a className="bbi-btn bbi-btn--primary bbi-btn--lg" href={data.primaryCta.href}>
            {data.primaryCta.label} <span className="arrow">→</span>
          </a>
          {data.trust && data.trust.map((t, i) => (
            <div key={i} className="bbi-cta-section__trust">
              <span className="dot" />
              <span>{t.html}</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ---------- page composition ----------------------------------------- */
function Landing({ mobile = false, data = OECM_DEFAULTS }) {
  const showTrust       = data.trustPhotos && data.trustPhotos.items && data.trustPhotos.items.length > 0;
  const showProof       = !!(data.proofStats && data.proofStats.length > 0);
  const showCrosslinks  = data.crosslinks && data.crosslinks.items && data.crosslinks.items.length > 0;
  const showOECMBar     = !!(data.oecmBar && data.oecmBar.show !== false);

  return (
    <div className={"scheme-default lp-page" + (mobile ? " lp-page--mobile" : "")}>
      {mobile ? <_HeaderMobile /> : <_HeaderDesktop current={data.headerCurrent} />}
      <LpBreadcrumbs items={data.crumbs} />
      <LpHero data={data.hero} />
      <LpIntro data={data.intro} />
      <LpDifferentiators data={data.diffs} />
      {showTrust       && <LpTrustRow data={data.trustPhotos} />}
      {showProof       && <LpProofBar stats={data.proofStats} />}
      {showCrosslinks  && <LpCrosslinks data={data.crosslinks} />}
      {showOECMBar     && <LpOECMBar data={data.oecmBar} />}
      <LpFAQ data={data.faqs} />
      <LpCloser data={data.closer} />
      <_Footer mobile={mobile} />
    </div>
  );
}

window.Landing = Landing;
window.LANDING_OECM_DEFAULTS = OECM_DEFAULTS;

}

/* ---------- SPEC TABLE ---------- */
const SPEC_ROW_DEFS = [
  { key: "brand",          label: "Brand",          source: "product",  field: "brand" },
  { key: "productLine",    label: "Product line",   source: "product",  field: "productLine" },
  { key: "modelCodes",     label: "Model codes",    source: "product",  field: "modelCodes",     join: " · " },
  { key: "dimensions",     label: "Dimensions",     source: "specs",    field: "dimensions" },
  { key: "weight",         label: "Weight",         source: "specs",    field: "weight" },
  { key: "weightCapacity", label: "Weight capacity",source: "specs",    field: "weightCapacity" },
  { key: "materials",      label: "Materials",      source: "specs",    field: "materials" },
  { key: "finishes",       label: "Finishes",       source: "specs",    field: "finishes",       join: ", " },
  { key: "features",       label: "Key features",   source: "specs",    field: "features",       list: true },
  { key: "certifications", label: "Certifications", source: "specs",    field: "certifications", join: " · " },
  { key: "warranty",       label: "Warranty",       source: "specs",    field: "warranty" },
  { key: "country",        label: "Country of origin", source: "specs", field: "country" },
  { key: "leadTime",       label: "Lead time",      source: "specs",    field: "leadTime" },
  { key: "compliance",     label: "Compliance",     source: "specs",    field: "compliance" },
];

function specHasValue(v) {
  if (v == null) return false;
  if (Array.isArray(v)) return v.length > 0;
  return String(v).trim().length > 0;
}

function PdSpecs({ specs, product }) {
  // Hidden rows for the canonical Ibex render are computed off `specs`.
  // Brand / productLine / modelCodes are sourced from product.* so the
  // table always includes the manufacturer + model context — these are
  // structural identity fields, not optional spec fields.
  const productCtx = {
    brand: product.brand,
    productLine: product.productLine,
    modelCodes: product.modelCodes ||
      (product.primaryModel
        ? [product.primaryModel].concat(product.extraModels || [])
        : []),
  };
  const visible = SPEC_ROW_DEFS.filter((def) => {
    const v = def.source === "product" ? productCtx[def.field] : specs[def.field];
    return specHasValue(v);
  });
  if (visible.length === 0) return null;
  return (
    <section className="pd-specs" aria-label="Specifications">
      <div className="pd-specs__inner">
        <div className="pd-specs__head">
          <p className="pd-specs__eyebrow">Specifications</p>
          <h2 className="pd-specs__h2">Everything we'd put on the spec sheet.</h2>
        </div>
        <div className="pd-specs__table">
          {visible.map((def) => {
            const v = def.source === "product" ? productCtx[def.field] : specs[def.field];
            let valNode;
            if (def.list && Array.isArray(v)) {
              valNode = (
                <ul>{v.map((it, i) => <li key={i}>{it}</li>)}</ul>
              );
            } else if (Array.isArray(v)) {
              valNode = v.join(def.join || ", ");
            } else {
              valNode = v;
            }
            return (
              <div key={def.key} className="pd-spec-row">
                <span className="pd-spec-row__label bbi-mono">{def.label}</span>
                <span className="pd-spec-row__value">{valNode}</span>
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

    <div className={"ap-row" + (status ? " ap-row--" + status : "")}>
      {cells.map((c, i) => (
        <span key={i} className={"ap-cell ap-cell--" + (i + 1)}>{c}</span>
      ))}
    </div>
  );
}

function APTable({ heads, rows }) {
  return (
    <div className="ap-table">
      <div className="ap-row ap-row--head">
        {heads.map((h, i) => (
          <span key={i} className={"ap-cell ap-cell--" + (i + 1)}>{h}</span>
        ))}
      </div>
      {rows.map((r, i) => (
        <APRow key={i} cells={r.cells} status={r.status} />
      ))}
    </div>
  );
}
