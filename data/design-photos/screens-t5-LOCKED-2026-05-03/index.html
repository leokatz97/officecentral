<!DOCTYPE html>
<html lang="en"><head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<title>BBI · Design canvas · 5 templates</title>
<style>
/* ===== tokens.css ===== */
/* ============================================================
   BBI tokens — chat 1 of N (scheme-default + globals + scales)
   Anchors: #D4252A red-surface · #A81E22 red-text · #0B0B0C ink
   No beige. No warm tint. No dark mode. No red headings.
   ============================================================ */

:root {
  /* ---- Typography globals ---- */
  --bodyFont: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --bodyFontWeight: 400;
  --bodyFontLineHeight: 1.55;
  --bodyFontBase: 16px;          /* desktop body baseline */

  --headingFont: "Inter Tight", "Inter", system-ui, sans-serif;
  --headingFontWeight: 600;
  --headingFontLineHeight: 1.1;   /* tighter than body, per brief */
  --headingFontBase: 48px;       /* H1 desktop baseline */

  /* ---- Spacing scale (4px base) ---- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-6: 24px;
  --space-8: 32px;
  --space-12: 48px;
  --space-16: 64px;
  --space-24: 96px;

  /* ---- Radius scale ---- */
  --inputRadius: 4px;
  --buttonRadius: 4px;       /* squared CTAs match the wordmark's tone */
  --cardRadius: 8px;
  --imageRadius: 4px;
  --productRadius: 8px;

  /* ---- Shadow scale (≤8% opacity, neutral black) ---- */
  --shadow-sm: 0 1px 2px rgba(11, 11, 12, 0.04), 0 2px 8px rgba(11, 11, 12, 0.05);
  --shadow-md: 0 2px 4px rgba(11, 11, 12, 0.05), 0 12px 32px rgba(11, 11, 12, 0.08);

  /* ---- Global colors (scheme-independent) ---- */
  --success: #1F6F3F;            /* fg on white  6.04:1  AA  */
  --success-rgb: 31, 111, 63;
  --error: #B33A1A;              /* rust — 5.93:1 AA on white. ~11° hue shift from brand red so users read it as a distinct color, not a brand-red variant. */
  --error-rgb: 179, 58, 26;

  /* ---- Badges (surfaces; labels speced bold/uppercase ≥11px) ---- */
  --saleBadgeBackground:     #D4252A;  /* white label, AA-large */
  --saleBadgeBackground-rgb: 212, 37, 42;
  --newBadgeBackground:      #0B0B0C;  /* white label, AAA */
  --newBadgeBackground-rgb:  11, 11, 12;
  --preorderBadgeBackground: #FFFFFF;  /* outlined, ink label */
  --preorderBadgeBackground-rgb: 255, 255, 255;
  --soldBadgeBackground:     #5A5A5E;  /* white label, 6.74:1 AA */
  --soldBadgeBackground-rgb: 90, 90, 94;
  --customBadgeBackground:   #FAFAFA;  /* ink label on surface */
  --customBadgeBackground-rgb: 250, 250, 250;
  --warningBackground:       #E8A317;  /* low-stock — ink label, 7.71:1 AA. Approved 2026-04-27. */
  --warningBackground-rgb:   232, 163, 23;

  /* ---- Header (white, charcoal, no beige) ---- */
  --headerBg:           #FFFFFF;
  --headerBg-rgb:       255, 255, 255;
  --headerColor:        #0B0B0C;       /* nav links — 20.10:1 AAA */
  --headerColor-rgb:    11, 11, 12;
  --headerHoverColor:   #A81E22;       /* hover only, never default — 5.88:1 AA */
  --headerHoverColor-rgb: 168, 30, 34;
  --headerIconColor:    #0B0B0C;
  --headerIconColor-rgb: 11, 11, 12;

  /* ---- Cart count (red dot — surface use, not text) ---- */
  --cartCountBg:        #D4252A;
  --cartCountBg-rgb:    212, 37, 42;
  --cartCountColor:     #FFFFFF;        /* numerals bold ≥11px → AA-large */
  --cartCountColor-rgb: 255, 255, 255;

  /* ---- Submenu (mega-nav drawer) ---- */
  --submenuBg:          #FFFFFF;
  --submenuBg-rgb:      255, 255, 255;
  --submenuColor:       #0B0B0C;        /* 20.10:1 AAA */
  --submenuColor-rgb:   11, 11, 12;
  --submenuHoverColor:  #A81E22;        /* 5.88:1 AA */
  --submenuHoverColor-rgb: 168, 30, 34;
}

/* ============================================================
   scheme-default — white canvas. Used on ~90% of pages.
   ============================================================ */
.scheme-default {
  /* Surfaces */
  --background:          #FFFFFF;
  --background-rgb:      255, 255, 255;
  --alternateBackground: #FAFAFA;
  --alternateBackground-rgb: 250, 250, 250;
  --cardBackground:     #FFFFFF;
  --cardBackground-rgb: 255, 255, 255;

  /* Text — ink on white  20.10:1 AAA · ink on surface 18.87:1 AAA */
  --textColor:          #0B0B0C;
  --textColor-rgb:      11, 11, 12;
  --linkColor:          #0B0B0C;        /* charcoal w/ 1px underline. NEVER red. */
  --linkColor-rgb:      11, 11, 12;
  --headingColor:       #0B0B0C;        /* never red. */
  --headingColor-rgb:   11, 11, 12;

  /* Primary button — charcoal solid. 20.10:1 AAA. */
  --buttonBackground:   #0B0B0C;
  --buttonBackground-rgb: 11, 11, 12;
  --buttonColor:        #FFFFFF;
  --buttonColor-rgb:    255, 255, 255;
  --buttonBorder:       #0B0B0C;
  --buttonBorder-rgb:   11, 11, 12;
  --buttonBackgroundHover: #D4252A;     /* red shows up on hover only — keeps red density <8% */
  --buttonBackgroundHover-rgb: 212, 37, 42;
  --buttonColorHover:   #FFFFFF;        /* 4.08:1 — label is bold ≥14px → AA-large */
  --buttonColorHover-rgb: 255, 255, 255;
  --buttonBorderHover:  #D4252A;
  --buttonBorderHover-rgb: 212, 37, 42;

  /* Alternate (secondary) button — outlined, charcoal text on white. 20.10:1 AAA. */
  --alternateButtonBackground: #FFFFFF;
  --alternateButtonBackground-rgb: 255, 255, 255;
  --alternateButtonColor: #0B0B0C;
  --alternateButtonColor-rgb: 11, 11, 12;
  --alternateButtonBorder: #0B0B0C;
  --alternateButtonBorder-rgb: 11, 11, 12;
  --alternateButtonBackgroundHover: #0B0B0C; /* invert on hover */
  --alternateButtonBackgroundHover-rgb: 11, 11, 12;
  --alternateButtonColorHover: #FFFFFF;
  --alternateButtonColorHover-rgb: 255, 255, 255;
  --alternateButtonBorderHover: #0B0B0C;
  --alternateButtonBorderHover-rgb: 11, 11, 12;

  /* Inputs */
  --inputBackground:    #FFFFFF;
  --inputBackground-rgb: 255, 255, 255;
  --inputColor:         #0B0B0C;        /* 20.10:1 AAA */
  --inputColor-rgb:     11, 11, 12;
  --inputBorder:        #0B0B0C;        /* 1px solid ink — high-trust procurement form treatment */
  --inputBorder-rgb:    11, 11, 12;

  /* Borders / dividers — DECORATIVE ONLY.
     --line-color is intentionally low-contrast (1.22:1) for hairlines.
     Focus rings do NOT use this token; see :focus-visible rule below. */
  --productBorder:      #E5E5E7;
  --productBorder-rgb:  229, 229, 231;
  --borderColor:        #E5E5E7;
  --borderColor-rgb:    229, 229, 231;
  --line-color:         #E5E5E7;       /* 1.22:1 on white — hairlines/dividers only */
  --line-color-rgb:     229, 229, 231;

  /* Misc UI */
  --ratingStarColor:    #0B0B0C;        /* charcoal stars — no goldenrod (warm tone banned) */
  --ratingStarColor-rgb: 11, 11, 12;
  --sliderArrowBackground: #FFFFFF;
  --sliderArrowBackground-rgb: 255, 255, 255;
  --sliderArrowColor:   #0B0B0C;        /* 20.10:1 AAA */
  --sliderArrowColor-rgb: 11, 11, 12;
  --shadowColor:        #0B0B0C;        /* used via rgba(var(--shadowColor-rgb), 0.0X) */
  --shadowColor-rgb:    11, 11, 12;

  /* Product icon (PDP feature pills) */
  --productIconColor:   #0B0B0C;        /* 18.87:1 AAA on surface */
  --productIconColor-rgb: 11, 11, 12;
  --productIconBg:      #FAFAFA;
  --productIconBg-rgb:  250, 250, 250;
}

/* ============================================================
   scheme-inverse — charcoal canvas. Hero / feature blocks only.
   Same token names; values flip. Globals (header/cart/submenu/
   typography/spacing/radius/badges) NOT redefined — they live
   under :root and stay scheme-independent per the brief.
   Header is never rendered on inverse, so the global hover red
   #A81E22 (which would fail 2.32:1 on charcoal) never applies.
   ============================================================ */
.scheme-inverse {
  /* Surfaces — cool charcoal stack, no warm tint */
  --background:          #0B0B0C;        /* anchor charcoal = canvas */
  --background-rgb:      11, 11, 12;
  --alternateBackground: #161618;        /* +5% lift, neutral */
  --alternateBackground-rgb: 22, 22, 24;
  --cardBackground:     #161618;        /* card plate; 1px borderColor on top */
  --cardBackground-rgb: 22, 22, 24;

  /* Text — white on charcoal 20.10:1 AAA · white on plate 18.41:1 AAA */
  --textColor:          #FFFFFF;
  --textColor-rgb:      255, 255, 255;
  --linkColor:          #FFFFFF;        /* white w/ underline. NEVER red on inverse — red-text #A81E22 = 2.32:1 fail */
  --linkColor-rgb:      255, 255, 255;
  --headingColor:       #FFFFFF;
  --headingColor-rgb:   255, 255, 255;

  /* Primary button — inverted: white solid on charcoal hero. 20.10:1 AAA. */
  --buttonBackground:   #FFFFFF;
  --buttonBackground-rgb: 255, 255, 255;
  --buttonColor:        #0B0B0C;
  --buttonColor-rgb:    11, 11, 12;
  --buttonBorder:       #FFFFFF;
  --buttonBorder-rgb:   255, 255, 255;
  --buttonBackgroundHover: #D4252A;     /* red appears on hover. red-surface vs charcoal canvas = 4.83:1 AA */
  --buttonBackgroundHover-rgb: 212, 37, 42;
  --buttonColorHover:   #FFFFFF;        /* 4.08:1 — label bold ≥14px → AA-large */
  --buttonColorHover-rgb: 255, 255, 255;
  --buttonBorderHover:  #D4252A;
  --buttonBorderHover-rgb: 212, 37, 42;

  /* Alternate button — outlined white on charcoal. 20.10:1 AAA */
  --alternateButtonBackground: transparent;
  --alternateButtonBackground-rgb: 11, 11, 12;   /* effective bg = canvas */
  --alternateButtonColor: #FFFFFF;
  --alternateButtonColor-rgb: 255, 255, 255;
  --alternateButtonBorder: #FFFFFF;
  --alternateButtonBorder-rgb: 255, 255, 255;
  --alternateButtonBackgroundHover: #FFFFFF; /* invert on hover */
  --alternateButtonBackgroundHover-rgb: 255, 255, 255;
  --alternateButtonColorHover: #0B0B0C;
  --alternateButtonColorHover-rgb: 11, 11, 12;
  --alternateButtonBorderHover: #FFFFFF;
  --alternateButtonBorderHover-rgb: 255, 255, 255;

  /* Inputs — fielded on plate, white text + white border for high-trust treatment */
  --inputBackground:    #161618;        /* plate so the field reads against canvas */
  --inputBackground-rgb: 22, 22, 24;
  --inputColor:         #FFFFFF;        /* 18.41:1 AAA on plate */
  --inputColor-rgb:     255, 255, 255;
  --inputBorder:        #FFFFFF;        /* 20.10:1 against canvas — symmetric to default's #0B0B0C */
  --inputBorder-rgb:    255, 255, 255;

  /* Borders / dividers — DECORATIVE ONLY, ~10% white per brief notes.
     #1F1F21 vs canvas #0B0B0C = 1.17:1 — symmetric to default's
     #E5E5E7/#FFFFFF (1.22:1). Same role, same low contrast.
     Focus rings do NOT use this token; the :focus-visible rule
     uses --textColor (now white) → 20.10:1 against canvas. */
  --productBorder:      #1F1F21;
  --productBorder-rgb:  31, 31, 33;
  --borderColor:        #1F1F21;
  --borderColor-rgb:    31, 31, 33;
  --line-color:         #1F1F21;
  --line-color-rgb:     31, 31, 33;

  /* Misc UI */
  --ratingStarColor:    #FFFFFF;        /* white stars on charcoal — no goldenrod */
  --ratingStarColor-rgb: 255, 255, 255;
  --sliderArrowBackground: #161618;
  --sliderArrowBackground-rgb: 22, 22, 24;
  --sliderArrowColor:   #FFFFFF;        /* 18.41:1 AAA on plate */
  --sliderArrowColor-rgb: 255, 255, 255;
  --shadowColor:        #000000;        /* shadows barely register on dark; cards lean on plate + 1px border instead */
  --shadowColor-rgb:    0, 0, 0;

  /* Product icon (PDP feature pills) */
  --productIconColor:   #FFFFFF;        /* 18.41:1 AAA on plate */
  --productIconColor-rgb: 255, 255, 255;
  --productIconBg:      #161618;
  --productIconBg-rgb:  22, 22, 24;
}

/* ============================================================
   Focus ring — uses existing tokens, no new variable name.
   --line-color stays decorative; focus is a 2px outline in
   --textColor with a 2px offset. On red surfaces it still hits
   4.93:1 against #D4252A, well over WCAG 1.4.11's 3:1 floor.
   ============================================================ */
:where(a, button, [role="button"], input, select, textarea, summary, [tabindex]):focus-visible {
  outline: 2px solid var(--textColor);
  outline-offset: 2px;
  border-radius: var(--inputRadius);   /* keeps the ring shape consistent on square targets */
}
/* On the inverse scheme (chat 2), --textColor flips to white,
   so the same rule keeps the ring visible on charcoal canvas. */

/* ============================================================
   Typography scale — mobile (≤768px) and desktop.
   Heading line-height tighter than body, per brief.
   ============================================================ */
:root {
  /* mobile defaults */
  --fs-h0:     44px;  --lh-h0:     1.05;  --ls-h0:     -0.02em;
  --fs-h1:     32px;  --lh-h1:     1.1;   --ls-h1:     -0.015em;
  --fs-h2:     24px;  --lh-h2:     1.15;  --ls-h2:     -0.01em;
  --fs-h3:     18px;  --lh-h3:     1.25;  --ls-h3:     -0.005em;
  --fs-body:   16px;  --lh-body:   1.55;  --ls-body:   0;
  --fs-small:  13px;  --lh-small:  1.5;   --ls-small:  0;
  --fs-button: 15px;  --lh-button: 1;     --ls-button: 0.01em;  /* button weight 600 always */
}
@media (min-width: 768px) {
  :root {
    --fs-h0:     72px;  --lh-h0:     1.0;
    --fs-h1:     48px;  --lh-h1:     1.05;
    --fs-h2:     32px;  --lh-h2:     1.1;
    --fs-h3:     22px;  --lh-h3:     1.2;
    --fs-body:   16px;  --lh-body:   1.55;
    --fs-small:  14px;  --lh-small:  1.5;
    --fs-button: 15px;  --lh-button: 1;
  }
}


/* ===== bbi-components.css ===== */
/* ============================================================
   BBI shared component styles
   Composes ONLY tokens from tokens.css. No new tokens, no overrides.
   Used across Homepage, Collection (cat + sub), Landing, PDP.
   ============================================================ */

/* ---- Reset / base ---- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--bodyFont);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--textColor);
  background: var(--background);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img { display: block; max-width: 100%; height: auto; }
a { color: var(--linkColor); }

/* Eyebrow / mono utility */
.bbi-mono {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ===== BUTTONS ===== */
.bbi-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 12px 20px;
  min-height: 44px;
  font-family: var(--bodyFont);
  font-size: var(--fs-button);
  line-height: var(--lh-button);
  letter-spacing: var(--ls-button);
  font-weight: 600;
  border-radius: var(--buttonRadius);
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  transition: background-color 120ms ease, color 120ms ease, border-color 120ms ease;
  user-select: none;
  white-space: nowrap;
}
.bbi-btn:focus { outline: none; }
.bbi-btn--sm { min-height: 36px; padding: 8px 14px; font-size: 13px; }
.bbi-btn--lg { min-height: 52px; padding: 16px 24px; font-size: 16px; }
.bbi-btn--full { width: 100%; }

.bbi-btn--primary {
  background: var(--buttonBackground);
  color: var(--buttonColor);
  border-color: var(--buttonBorder);
}
.bbi-btn--primary:hover, .bbi-btn--primary[data-state="hover"] {
  background: var(--buttonBackgroundHover);
  color: var(--buttonColorHover);
  border-color: var(--buttonBorderHover);
}

.bbi-btn--secondary {
  background: var(--alternateButtonBackground);
  color: var(--alternateButtonColor);
  border-color: var(--alternateButtonBorder);
}
.bbi-btn--secondary:hover, .bbi-btn--secondary[data-state="hover"] {
  background: var(--alternateButtonBackgroundHover);
  color: var(--alternateButtonColorHover);
  border-color: var(--alternateButtonBorderHover);
}

.bbi-btn--tertiary {
  background: transparent;
  color: var(--textColor);
  border-color: transparent;
  padding-left: 4px;
  padding-right: 4px;
  border-radius: 2px;
}
.bbi-btn--tertiary .label { position: relative; }
.bbi-btn--tertiary .label::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 1px;
  background: currentColor;
  opacity: 1;
  transition: opacity 120ms ease;
}
.scheme-default .bbi-btn--tertiary:hover { color: var(--headerHoverColor); }
.scheme-inverse .bbi-btn--tertiary:hover { color: var(--textColor); }

.bbi-btn .arrow { display: inline-block; transform: translateY(-0.5px); }

/* ===== BADGES ===== */
.bbi-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 22px;
  padding: 0 10px;
  font-family: var(--headingFont);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
  white-space: nowrap;
}
.bbi-badge--sale       { background: var(--saleBadgeBackground); color: #fff; }
.bbi-badge--new        { background: var(--newBadgeBackground); color: #fff; }
.bbi-badge--canadian   { background: transparent; color: var(--textColor); border: 1px solid var(--textColor); }
.bbi-badge--canadian .leaf { width: 12px; height: 12px; color: var(--saleBadgeBackground); }
.bbi-badge--oem        { background: transparent; color: var(--textColor); border: 1px solid var(--borderColor); opacity: 0.85; }
.bbi-badge--oecm       { background: transparent; color: var(--textColor); border: 1px solid var(--textColor); }
.bbi-badge--oecm .dot  { width: 6px; height: 6px; border-radius: 99px; background: var(--saleBadgeBackground); }

/* ===== HEADER (default scheme only) ===== */
.bbi-header {
  background: var(--headerBg);
  color: var(--headerColor);
  border-bottom: 1px solid var(--borderColor);
  position: relative;
  z-index: 10;
}
.bbi-header__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  height: 72px;
  display: flex;
  align-items: center;
  gap: 32px;
}
.bbi-header__logo {
  display: inline-flex;
  align-items: center;
  height: 40px;
  text-decoration: none;
}
.bbi-header__logo img { height: 36px; width: auto; }
.bbi-header__nav {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 16px;
}
.bbi-nav-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 72px;
  padding: 0 14px;
  color: var(--headerColor);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  position: relative;
}
.bbi-nav-item:hover { color: var(--headerHoverColor); }
.bbi-nav-item[aria-current="page"]::after,
.bbi-nav-item.is-current::after {
  content: "";
  position: absolute;
  left: 14px; right: 14px; bottom: 18px;
  height: 1px;
  background: var(--textColor);
}
.bbi-header__utility {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 14px;
}
.bbi-header__utility a:not(.bbi-btn) { color: var(--headerColor); text-decoration: none; }
/* Explicit re-assert: when a .bbi-btn lives inside .bbi-header__utility,
   the button's own foreground/background tokens always win, regardless
   of cascade-order quirks across cached stylesheets. Specificity (0,2,0). */
.bbi-header__utility .bbi-btn--primary {
  background: var(--buttonBackground);
  color: var(--buttonColor);
  border-color: var(--buttonBorder);
}
.bbi-header__utility .bbi-btn--primary:hover {
  background: var(--buttonBackgroundHover);
  color: var(--buttonColorHover);
  border-color: var(--buttonBorderHover);
}
.bbi-header__utility .phone { color: var(--headerColor); }
.bbi-header__utility .phone b { font-weight: 600; }

/* Mobile header */
.bbi-header--mobile .bbi-header__inner { height: 56px; padding: 0 16px; gap: 12px; }
.bbi-header--mobile .bbi-header__logo img { height: 30px; }
.bbi-hamburger {
  margin-left: auto;
  width: 40px; height: 40px;
  display: inline-flex;
  align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid var(--borderColor);
  border-radius: var(--inputRadius);
  cursor: pointer;
}
.bbi-hamburger svg { width: 20px; height: 20px; stroke: var(--textColor); fill: none; stroke-width: 2; }
.bbi-header--mobile .bbi-header__phone {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--headerColor);
  text-decoration: none;
}
.bbi-header--mobile .bbi-header__phone svg {
  width: 16px; height: 16px;
  fill: none; stroke: currentColor; stroke-width: 2;
}

/* ===== FOOTER (always inverse — apply .scheme-inverse on the element) ===== */
.bbi-footer {
  background: var(--background);
  color: var(--textColor);
}
.bbi-footer__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 64px 32px 24px;
}
.bbi-footer__top {
  display: grid;
  grid-template-columns: 1.1fr 3fr;
  gap: 64px;
  padding-bottom: 48px;
  border-bottom: 1px solid var(--borderColor);
}
.bbi-footer__brand-plate {
  display: inline-block;
  /* Logo plate intentionally inverts the surrounding inverse scheme so
     the wordmark sits on white. Composed via the default scheme's
     surface tokens — no literals. */
  background: var(--headerBg);
  padding: 16px 20px;
  border-radius: var(--cardRadius);
}
.bbi-footer__brand-plate img { height: 44px; width: auto; display: block; }
.bbi-footer__tagline {
  margin: 20px 0 16px;
  font-size: 14px;
  line-height: 1.55;
  max-width: 32ch;
  color: rgba(var(--textColor-rgb), 0.78);
}
.bbi-footer__canadian {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--textColor);
}
.bbi-footer__canadian .leaf { width: 14px; height: 14px; color: var(--saleBadgeBackground); }
.bbi-footer__cols {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px;
}
.bbi-footer__col h4 {
  font-family: var(--headingFont);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 0 0 16px;
  color: var(--textColor);
}
.bbi-footer__col ul {
  list-style: none;
  margin: 0; padding: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.bbi-footer__col a {
  color: rgba(var(--textColor-rgb), 0.78);
  text-decoration: none;
  font-size: 14px;
  line-height: 1.4;
}
.bbi-footer__col a:hover { color: var(--textColor); text-decoration: underline; }
/* Nav-link hover composes the global hover-red token. On inverse this is
   #A81E22 vs charcoal = 2.32:1 — flagged in the audit; reserved for hover
   only so it never sits at-rest. Footer links use it sparingly. */
.bbi-footer__col--nav a:hover { color: var(--headerHoverColor); }
.bbi-footer__col--contact .row {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 8px;
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.45;
}
.bbi-footer__col--contact .lbl {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.55);
  padding-top: 2px;
}
.bbi-footer__col--contact .row span:not(.lbl), .bbi-footer__col--contact .row a {
  color: var(--textColor);
}
.bbi-footer__bottom {
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: rgba(var(--textColor-rgb), 0.55);
}
.bbi-footer__legal { display: flex; gap: 24px; }
.bbi-footer__legal a {
  color: rgba(var(--textColor-rgb), 0.55);
  text-decoration: none;
}
.bbi-footer__legal a:hover { color: var(--textColor); }

/* ===== PRODUCT CARD (16:9 image at top per brief) ===== */
.bbi-card {
  display: flex;
  flex-direction: column;
  background: var(--cardBackground);
  border-radius: var(--cardRadius);
  overflow: hidden;
}
.bbi-card--product {
  border: 1px solid var(--borderColor);
}
.bbi-card__media {
  position: relative;
  background: var(--alternateBackground);
  aspect-ratio: 16 / 9;
  overflow: hidden;
}
.bbi-card__media .bbi-badge {
  position: absolute;
  top: 12px;
  left: 12px;
}
.bbi-card__body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bbi-card__brand {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--textColor);
  opacity: 0.6;
  margin: 0;
}
.bbi-card__title {
  font-family: var(--headingFont);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  margin: 0;
  letter-spacing: -0.005em;
}
.bbi-card__title a { color: inherit; text-decoration: none; }
.bbi-card__title a:hover { text-decoration: underline; }
.bbi-card__cta {
  margin-top: auto;
  padding-top: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--textColor);
  text-decoration: none;
  font-family: var(--bodyFont);
}
.bbi-card__cta:hover { color: var(--headerHoverColor); }

/* Collection tile (full-bleed image, overlay heading) */
.bbi-card--collection {
  position: relative;
  display: block;
  aspect-ratio: 4 / 3;
  text-decoration: none;
  color: inherit;
  overflow: hidden;
  border-radius: var(--cardRadius);
  background: var(--alternateBackground);
}
.bbi-card--collection .bbi-card__media {
  aspect-ratio: auto;
  width: 100%; height: 100%;
}
.bbi-card--collection .bbi-card__overlay {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 20px 20px 16px;
  /* Survives the placeholder→photo transition: gradient sits over real
     imagery in production, same composition. */
  background: linear-gradient(to top, rgba(var(--shadowColor-rgb), 0.85), rgba(var(--shadowColor-rgb), 0));
  color: #FFFFFF;
}
.bbi-card--collection .bbi-card__overlay h3 {
  font-family: var(--headingFont);
  font-size: 18px;
  font-weight: 600;
  margin: 0;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.bbi-card--collection .bbi-card__overlay .count {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  /* White on dark gradient — direct literal. White is not a token in
     the inverse scheme of a non-themed overlay; this is the single
     hard-coded white inside the placeholder/overlay system. */
  color: rgba(255,255,255,0.7);
  display: block;
  margin-top: 2px;
}

/* ===== STRIPED PLACEHOLDER MEDIA (we don't ship hand-drawn art) ===== */
.bbi-ph {
  position: relative;
  width: 100%;
  height: 100%;
  background:
    repeating-linear-gradient(
      135deg,
      rgba(11,11,12,0.04) 0 8px,
      rgba(11,11,12,0.07) 8px 16px
    ),
    var(--alternateBackground);
  display: flex;
  align-items: center;
  justify-content: center;
}
.bbi-ph__label {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--textColor);
  opacity: 0.5;
  background: rgba(255,255,255,0.7);
  padding: 4px 8px;
  border-radius: 2px;
  text-align: center;
  max-width: 80%;
}
.bbi-ph--dark {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.04) 0 8px,
      rgba(255,255,255,0.07) 8px 16px
    ),
    #161618;
}
.bbi-ph--dark .bbi-ph__label {
  color: rgba(255,255,255,0.7);
  background: rgba(11,11,12,0.6);
}

/* ===== CTA SECTION (charcoal canvas closer — apply .scheme-inverse on the element) ===== */
.bbi-cta-section {
  background: var(--background);
  color: var(--textColor);
}
.bbi-cta-section__inner {
  max-width: 1320px;
  margin: 0 auto;
  padding: 96px 32px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  align-items: center;
}
.bbi-cta-section__eyebrow {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(var(--textColor-rgb), 0.7);
  margin: 0 0 16px;
}
.bbi-cta-section__heading {
  font-family: var(--headingFont);
  font-size: clamp(32px, 4.2vw, 56px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  font-weight: 600;
  margin: 0 0 20px;
  text-wrap: balance;
}
.bbi-cta-section__sub {
  font-size: 17px;
  line-height: 1.55;
  color: rgba(var(--textColor-rgb), 0.78);
  max-width: 52ch;
  margin: 0;
}
.bbi-cta-section__actions {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: flex-start;
}
.bbi-cta-section__actions .bbi-btn--primary {
  /* Inside .scheme-inverse, --buttonBackground flips to white and
     --buttonColor to ink — no override needed. Hover red comes through
     --buttonBackgroundHover. This rule kept as a no-op marker. */
  background: var(--buttonBackground);
  color: var(--buttonColor);
  border-color: var(--buttonBorder);
}
.bbi-cta-section__actions .bbi-btn--primary:hover {
  background: var(--buttonBackgroundHover);
  color: var(--buttonColorHover);
  border-color: var(--buttonBorderHover);
}
.bbi-cta-section__trust {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14px;
  color: rgba(var(--textColor-rgb), 0.78);
}
.bbi-cta-section__trust .dot {
  flex: 0 0 auto;
  margin-top: 7px;
  width: 6px; height: 6px;
  border-radius: 99px;
  background: var(--saleBadgeBackground);
}
.bbi-cta-section__trust b { color: var(--textColor); font-weight: 600; }
.bbi-cta-section__trust a { color: var(--textColor); text-decoration: underline; }

/* ===== SECTION RHYTHM HELPERS ===== */
.bbi-section { padding: 96px 0; }
.bbi-section--sm { padding: 64px 0; }
.bbi-section--alt { background: var(--alternateBackground); }
.bbi-container { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
.bbi-section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 40px;
}
.bbi-section-head__eyebrow {
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--textColor);
  opacity: 0.6;
  margin: 0 0 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.bbi-section-head__eyebrow::before {
  content: "";
  width: 24px; height: 1px;
  background: var(--saleBadgeBackground);
}
.bbi-section-head__title {
  font-family: var(--headingFont);
  font-size: var(--fs-h1);
  line-height: var(--lh-h1);
  letter-spacing: -0.015em;
  font-weight: 600;
  margin: 0;
  max-width: 22ch;
  text-wrap: balance;
}
.bbi-section-head__sub {
  font-size: 15px;
  line-height: 1.55;
  color: var(--textColor);
  opacity: 0.78;
  max-width: 42ch;
  margin: 0;
  text-wrap: pretty;
}

/* ===== BREADCRUMBS ===== */
.bbi-crumbs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-size: 13px;
  color: var(--textColor);
  margin: 0;
  padding: 0;
  list-style: none;
}
.bbi-crumbs li { display: inline-flex; align-items: center; gap: 8px; }
.bbi-crumbs li:not(:last-child)::after {
  content: "/";
  opacity: 0.4;
}
.bbi-crumbs a {
  color: var(--textColor);
  opacity: 0.65;
  text-decoration: none;
}
.bbi-crumbs a:hover { opacity: 1; text-decoration: underline; }
.bbi-crumbs li:last-child { font-weight: 500; }


/* ===== homepage.css ===== */
/* ============================================================
   Homepage-specific layout. Composes tokens + Phase-2 patterns.
   No new tokens. All colors via var().
   ============================================================ */

.hp-root { background: var(--background); color: var(--textColor); }

/* ===== HERO ===== */
.hp-hero {
  background: var(--background);
  border-bottom: 1px solid var(--borderColor);
  padding: 72px 0 96px;
}
.hp-hero__inner {
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 80px;
  align-items: center;
}
.hp-hero__copy { max-width: 580px; }
.hp-hero__eyebrow {
  margin: 0 0 24px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--textColor);
  opacity: 0.7;
}
.hp-hero__eyebrow .dot {
  width: 6px; height: 6px; border-radius: 99px;
  background: var(--saleBadgeBackground);
}
.hp-hero__title {
  font-family: var(--headingFont);
  font-size: clamp(40px, 5.4vw, 76px);
  line-height: 1.0;
  letter-spacing: -0.02em;
  font-weight: 600;
  margin: 0 0 24px;
  text-wrap: balance;
}
/* Deck — heading font, 500, full-strength ink, sits between H1 and body. */
.hp-hero__deck {
  font-family: var(--headingFont);
  font-size: 22px;
  line-height: 1.3;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--textColor);
  margin: 0 0 24px;
  max-width: 42ch;
  text-wrap: pretty;
}
.hp-hero__sub {
  font-size: 18px;
  line-height: 1.55;
  margin: 0 0 32px;
  color: var(--textColor);
  opacity: 0.85;
  max-width: 52ch;
  text-wrap: pretty;
}
.hp-hero__actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

/* The brief's literal "red primary CTA" — we honor it on the hero
   only by composing --saleBadgeBackground (the only red surface
   token in the system). This is a deliberate exception from the
   global rule that primary defaults are charcoal, scoped to the
   single hero CTA so red density stays inside 5–8% target. */
.hp-hero__cta-red {
  background: var(--saleBadgeBackground);
  color: var(--buttonColor);
  border-color: var(--saleBadgeBackground);
}
.hp-hero__cta-red:hover {
  background: var(--headerHoverColor);
  color: var(--buttonColor);
  border-color: var(--headerHoverColor);
}

.hp-hero__micro {
  font-size: 13px;
  color: var(--textColor);
  opacity: 0.7;
  margin: 0;
}
.hp-hero__micro a { color: var(--linkColor); text-decoration: underline; }

.hp-hero__media {
  position: relative;
  border-radius: var(--cardRadius);
  overflow: hidden;
  background: var(--alternateBackground);
  border: 1px solid var(--borderColor);
}
.hp-hero__media .bbi-ph { aspect-ratio: 16 / 11; }
.hp-hero__caption {
  position: absolute;
  left: 16px; bottom: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: rgba(var(--shadowColor-rgb), 0.92);
  color: var(--buttonColor);
  border-radius: 2px;
  font-family: "JetBrains Mono", ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.hp-hero__caption .dot {
  width: 6px; height: 6px; border-radius: 99px;
  background: var(--saleBadgeBackground);
}

/* Mobile hero */
.hp-mobile .hp-hero { padding: 32px 0 48px; }
.hp-mobile .hp-hero__inner { grid-template-columns: 1fr; gap: 32px; }
.hp-mobile .hp-hero__title { font-size: 40px; line-height: 1.05; }
.hp-mobile .hp-hero__deck { font-size: 18px; line-height: 1.35; margin-bottom: 20px; }
.hp-mobile .hp-hero__sub { font-size: 16px; }
.hp-mobile .hp-hero__actions { flex-direction: column; align-items: stretch; }
.hp-mobile .hp-hero__actions .bbi-btn { width: 100%; }
.hp-mobile .hp-hero__media .bbi-ph { aspect-ratio: 4 / 3; }

/* ===== SHOP ENTRY ===== */
.hp-shop__head {
  align-items: flex-end;
}
.hp-shop__head-right {
  max-width: 460px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: flex-start;
}
.hp-shop__tiles {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}
.hp-shop__tiles--mobile {
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* ===== FEATURED PRODUCTS ===== */
.hp-products__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.hp-products__grid--mobile {
  grid-template-columns: 1fr;
  gap: 16px;
}
.hp-products__all { align-self: end; }

/* ===== OECM BAR — quiet, single full-width band ===== */
.hp-oecm {
  border-top: 1px solid var(--borderColor);
  border-bottom: 1px solid var(--borderColor);
  background: var(--background);
}
.hp-oecm__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  padding: 24px 32px;
  max-width: 1320px;
  margin: 0 auto;
}
.hp-oecm__lead {
  display: flex;
  align-items: center;
  gap: 20px;
  flex: 1 1 auto;
  min-width: 0;
}
.hp-oecm__lead .bbi-badge--oecm {
  flex: 0 0 auto;
  height: 28px;
  padding: 0 12px;
  font-size: 12px;
}
.hp-oecm__copy {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--textColor);
  opacity: 0.85;
  max-width: 80ch;
}
.hp-oecm__meta { flex: 0 0 auto; }

.hp-mobile .hp-oecm__inner {
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
  padding: 24px 16px;
}
.hp-mobile .hp-oecm__lead { flex-direction: column; align-items: flex-start; gap: 12px; }

/* ===== INDUSTRIES ===== */
.hp-industries__grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}
.hp-industries__grid--mobile {
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.hp-industry {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  background: var(--cardBackground);
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  overflow: hidden;
  transition: transform 120ms ease, border-color 120ms ease;
}
.hp-industry:hover {
  border-color: var(--textColor);
}
.hp-industry__media {
  background: var(--alternateBackground);
}
.hp-industry__body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hp-industry__num {
  color: var(--textColor);
  opacity: 0.6;
}
.hp-industry__title {
  font-family: var(--headingFont);
  font-size: 17px;
  font-weight: 600;
  margin: 2px 0 0;
  letter-spacing: -0.005em;
}
.hp-industry__note {
  font-size: 13px;
  margin: 0;
  color: var(--textColor);
  opacity: 0.7;
  line-height: 1.4;
}

/* ===== SERVICES ===== */
.hp-services__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  overflow: hidden;
}
.hp-services__grid--mobile {
  grid-template-columns: 1fr;
}
.hp-service {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--background);
  border-right: 1px solid var(--borderColor);
}
.hp-service:last-child { border-right: none; }
.hp-services__grid--mobile .hp-service {
  border-right: none;
  border-bottom: 1px solid var(--borderColor);
}
.hp-services__grid--mobile .hp-service:last-child { border-bottom: none; }
.hp-service__num {
  color: var(--saleBadgeBackground);
  letter-spacing: 0.08em;
}
.hp-service__title {
  font-family: var(--headingFont);
  font-size: 22px;
  margin: 4px 0 0;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.hp-service__body {
  font-size: 14px;
  line-height: 1.55;
  margin: 0;
  color: var(--textColor);
  opacity: 0.85;
}
.hp-service__list {
  list-style: none;
  padding: 0;
  margin: 4px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hp-service__list li {
  position: relative;
  padding-left: 20px;
  font-size: 13px;
  color: var(--textColor);
  opacity: 0.85;
}
.hp-service__list li::before {
  content: "";
  position: absolute;
  left: 0; top: 8px;
  width: 12px; height: 1px;
  background: var(--textColor);
}
.hp-service__cta { margin-top: auto; align-self: flex-start; }

/* ===== TESTIMONIALS / OUR WORK ===== */
.hp-work__grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 32px;
  align-items: stretch;
}
.hp-work__grid--mobile { grid-template-columns: 1fr; gap: 24px; }

.hp-work__quote {
  background: var(--background);
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.hp-work__mark {
  width: 32px; height: 24px;
  color: var(--saleBadgeBackground);
}
.hp-work__quote blockquote {
  font-family: var(--headingFont);
  font-size: 22px;
  line-height: 1.35;
  letter-spacing: -0.005em;
  margin: 0;
  font-weight: 500;
  text-wrap: pretty;
}
.hp-work__attr {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--borderColor);
}
.hp-work__avatar {
  width: 44px; height: 44px; border-radius: 99px; overflow: hidden;
  background: var(--alternateBackground);
  flex: 0 0 auto;
}
.hp-work__avatar .bbi-ph { width: 100%; height: 100%; }
.hp-work__avatar .bbi-ph__label { font-size: 11px; padding: 0; background: transparent; }
.hp-work__name {
  margin: 0;
  font-weight: 600;
  font-size: 14px;
}
.hp-work__role {
  margin: 0;
  font-size: 12px;
  color: var(--textColor);
  opacity: 0.7;
}
.hp-work__cases {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
.hp-case {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 20px;
  text-decoration: none;
  color: inherit;
  background: var(--background);
  border: 1px solid var(--borderColor);
  border-radius: var(--cardRadius);
  overflow: hidden;
  transition: border-color 120ms ease;
}
.hp-case:hover { border-color: var(--textColor); }
.hp-case__media { background: var(--alternateBackground); }
.hp-case__media .bbi-ph { height: 100%; }
.hp-case__body {
  padding: 16px 20px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  justify-content: center;
}
.hp-case__year {
  color: var(--textColor);

}
.hp-case__client {
  font-family: var(--headingFont);
  font-size: 18px;
  margin: 0;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.hp-case__scope {
  font-size: 13px;
  margin: 0;
  color: var(--textColor);
  opacity: 0.78;
}

.hp-mobile .hp-case { grid-template-columns: 1fr; }
.hp-mobile .hp-case__media { aspect-ratio: 16/9; }
.hp-mobile .hp-case__body { padding: 16px; }
.hp-mobile .hp-work__quote { padding: 24px; }
.hp-mobile .hp-work__quote blockquote { font-size: 18px; }

/* ===== Section padding overrides for mobile ===== */
.hp-mobile .bbi-section { padding: 56px 0; }

.hp-mobile .bbi-section-head {

}
.hp-mobile .bbi-section-head__title { font-size: 28px; line-height: 1.1; }

/* ===== Mobile footer collapse ===== */
.hp-mobile .bbi-footer__inner { padding: 48px 16px 24px; }

.hp-mobile .bbi-footer__cols {

.hp-mobile .bbi-footer__bottom {
