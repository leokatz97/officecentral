const AI_DONE = new Set([
  "ceiling-grids-sound-acoustic-dampeners-1","d-top-table","height-adjustable-table-5-sizes",
  "ibex-upholstered-seat-mesh-back-multi-tilter-1","l-shape-desk-hutch","l-shape-height-adjustable-desk-set",
  "loop-leg-table","medicine-wheel-table-indigenous","obusforme-comfort-high-back-chair-fabric-1240-3",
  "overtime-350-high-back-heavy-duty-multi-tilter-mvl13040","overtime-high-back-multi-tilter-chair-mvl2756",
  "pedestal-box-box-file-with-or-without-wheels","robust-high-back-multi-tilter-chair-500lb-weight-capacity-glb74475",
  "roma-1900-nesting-chair","training-flip-top-tables-1","u-shape-desk-nlp205",
  "u-shape-height-adjust-desk","u-shape-height-adjustable-desk-suite-zira","willow-bariatric-chair"
]);

const STORE_BASE = "https://www.brantbusinessinteriors.com/products/";
const NOTES_KEY = "bbi_hero100_notes_v2";

// Per-product data shape: { brand, product_line, model_code, key_spec, finishes, features, notes }
const FIELDS = [
  { key: 'brand',        label: 'Brand / Manufacturer', placeholder: 'e.g. Global, ObusForme', col: 'half' },
  { key: 'product_line', label: 'Product Line',          placeholder: 'e.g. Zira, Overtime 350', col: 'half' },
  { key: 'model_code',   label: 'Model Code',            placeholder: 'e.g. MVL2756',           col: 'half' },
  { key: 'key_spec',     label: 'Key Spec (for title)',  placeholder: 'e.g. 72" Walnut, 500lb', col: 'half' },
  { key: 'finishes',     label: 'Finishes (comma-sep)',  placeholder: 'e.g. walnut, black, white', col: 'full' },
  { key: 'features',     label: 'Features (comma-sep)',  placeholder: 'e.g. height-adjustable, mesh-back, lumbar', col: 'full' },
  { key: 'notes',        label: 'Extra notes',           placeholder: 'Dims, lead time, anything else…', col: 'full', textarea: true },
];

let notes = {};
let sortCol = 'rank';
let sortAsc = true;

function loadNotes() {
  try { notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch(e) { notes = {}; }
}

function saveField(handle, field, val) {
  if (!notes[handle]) notes[handle] = {};
  notes[handle][field] = val;
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
  // Refresh the preview title for this row without full re-render
  const previewEl = document.getElementById('preview-' + handle);
  if (previewEl) previewEl.innerHTML = buildPreviewTitle(handle);
}

function hasAnyData(handle) {
  if (!notes[handle]) return false;
  return FIELDS.some(f => (notes[handle][f.key] || '').trim().length > 0);
}

function clearAllNotes() {
  if (!confirm('Clear all your saved data? This cannot be undone.')) return;
  notes = {};
  localStorage.removeItem(NOTES_KEY);
  render();
}

function buildPreviewTitle(handle) {
  const d = notes[handle] || {};
  const line = (d.product_line || '').trim();
  const code = (d.model_code || '').trim();
  const spec = (d.key_spec || '').trim();
  if (!line && !code && !spec) return '<em style="color:#bbb">Fill Product Line + Model Code + Key Spec to preview…</em>';
  let title = line || '?';
  if (code) title += ' ' + code;
  if (spec) title += ' — ' + spec;
  return '<strong>Preview:</strong> ' + escHtml(title);
}

function getFiltered() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const ft = document.getElementById('filter-type').value;
  const fs = document.getElementById('filter-status').value;
  return PRODUCTS.filter(p => {
    if (q && !p.title.toLowerCase().includes(q) && !p.handle.includes(q)) return false;
    if (ft && p.type !== ft) return false;
    if (fs === 'todo' && AI_DONE.has(p.handle)) return false;
    if (fs === 'done' && !AI_DONE.has(p.handle)) return false;
    if (fs === 'notes' && !hasAnyData(p.handle)) return false;
    return true;
  });
}

function sortProducts(arr) {
  return [...arr].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'type') { va = va || ''; vb = vb || ''; }
    if (sortCol === 'title') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = col === 'rank'; }
  render();
}

function fmt(n) {
  if (!n) return '—';
  return '$' + n.toLocaleString('en-CA', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function typeLabel(t) {
  if (!t) return '';
  return t.replace('type:', '');
}

function render() {
  const filtered = sortProducts(getFiltered());
  const tbody = document.getElementById('tbody');
  const doneCount = PRODUCTS.filter(p => AI_DONE.has(p.handle)).length;
  const noteCount = PRODUCTS.filter(p => hasAnyData(p.handle)).length;

  // Progress bar (AI done)
  const pct = Math.round(doneCount / 100 * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-meta').textContent =
    `AI scraped: ${doneCount}/100 · Your data: ${noteCount} products filled · ${100 - doneCount} still need lookup`;

  document.getElementById('count-label').textContent =
    filtered.length === 100 ? '100 products' : `${filtered.length} of 100`;

  // Sort arrows
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    th.classList.toggle('sorted', th.dataset.col === sortCol);
    if (th.dataset.col === sortCol) arrow.textContent = sortAsc ? ' ↑' : ' ↓';
    else arrow.textContent = ' ↕';
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('empty-state').style.display = '';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  tbody.innerHTML = filtered.map(p => {
    const isDone = AI_DONE.has(p.handle);
    const d = notes[p.handle] || {};

    const formFields = FIELDS.map(f => {
      const val = escHtml(d[f.key] || '');
      const filled = (d[f.key] || '').trim().length > 0;
      const cls = filled ? 'filled' : '';
      const h = escHtml(p.handle);
      const fk = f.key;
      if (f.textarea) {
        return `<div class="field ${f.col}">
          <label>${f.label}</label>
          <textarea class="${cls}" placeholder="${f.placeholder}"
            onblur="saveField('${h}','${fk}',this.value);this.classList.toggle('filled',this.value.trim().length>0)"
          >${val}</textarea>
        </div>`;
      }
      return `<div class="field ${f.col}">
        <label>${f.label}</label>
        <input type="text" class="${cls}" placeholder="${f.placeholder}" value="${val}"
          onblur="saveField('${h}','${fk}',this.value);this.classList.toggle('filled',this.value.trim().length>0)">
      </div>`;
    }).join('');

    return `<tr class="${isDone ? 'done-row' : ''}">
      <td class="rank">${p.rank}</td>
      <td class="title">
        ${p.title}
        <small>${p.handle}</small>
      </td>
      <td class="type">${p.type ? `<span class="type-chip">${typeLabel(p.type)}</span>` : ''}</td>
      <td class="revenue">${fmt(p.revenue)}</td>
      <td class="status">
        <span class="badge ${isDone ? 'done' : 'todo'}">${isDone ? 'AI done' : 'needs lookup'}</span>
      </td>
      <td class="links">
        <a class="link-btn admin" href="${p.admin}" target="_blank">Admin</a><br>
        <a class="link-btn store" href="${STORE_BASE}${p.handle}" target="_blank">Store</a>
      </td>
      <td class="notes">
        <div class="data-form">${formFields}</div>
        <div class="preview-title" id="preview-${p.handle}">${buildPreviewTitle(p.handle)}</div>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function csvCell(val) {
  return `"${String(val||'').replace(/"/g,'""').replace(/\n/g,' | ')}"`;
}

function exportCSV() {
  const headers = ['rank','handle','title','type','revenue','ai_done',
    'brand','product_line','model_code','key_spec','finishes','features','notes'];
  const rows = [headers];
  PRODUCTS.forEach(p => {
    const d = notes[p.handle] || {};
    rows.push([
      p.rank,
      csvCell(p.handle),
      csvCell(p.title),
      csvCell(p.type),
      p.revenue,
      AI_DONE.has(p.handle) ? 'yes' : 'no',
      csvCell(d.brand),
      csvCell(d.product_line),
      csvCell(d.model_code),
      csvCell(d.key_spec),
      csvCell(d.finishes),
      csvCell(d.features),
      csvCell(d.notes),
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hero-100-specs.csv';
  a.click();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-type').addEventListener('change', render);
document.getElementById('filter-status').addEventListener('change', render);

loadNotes();
render();
</script>
